<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europa 2026 — Roteiro de Viagem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1410;
    --warm-mid: #8b7355;
    --accent: #c8462b;
    --accent-light: #e8956d;
    --gold: #c9a84c;
    --card-bg: #faf7f2;
    --border: #ddd5c0;
    --shadow: rgba(26,20,16,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--ink);
    color: var(--cream);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }

  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .site-header .subtitle {
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 0.3rem;
  }

  /* DAY NAV */
  .day-nav {
    background: var(--ink);
    padding: 0 1rem 1rem;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    display: flex;
    justify-content: center;
  }
  .day-nav::-webkit-scrollbar { display: none; }

  .day-nav-inner {
    display: flex;
    gap: 0.4rem;
    min-width: max-content;
    padding: 0 0.5rem;
  }

  .day-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.65);
    padding: 0.45rem 0.75rem;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .day-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .day-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
    font-weight: 700;
  }

  /* MAIN */
  .main {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
  }

  /* DAY PANEL */
  .day-panel { display: none; }
  .day-panel.active { display: block; animation: fadeUp 0.35s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    margin-bottom: 2rem;
    padding-bottom: 1.2rem;
    border-bottom: 2px solid var(--border);
  }

  .day-label {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    line-height: 1.15;
    color: var(--ink);
  }

  .day-date {
    font-size: 0.8rem;
    color: var(--warm-mid);
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }

  .day-intro {
    background: var(--ink);
    color: var(--cream);
    padding: 1.2rem 1.4rem;
    border-radius: 6px;
    font-size: 0.9rem;
    line-height: 1.7;
    margin-bottom: 2rem;
    border-left: 4px solid var(--gold);
  }

  /* TIMELINE */
  .timeline { position: relative; }

  .timeline::before {
    content: '';
    position: absolute;
    left: 52px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }

  @media (max-width: 500px) {
    .timeline::before { left: 44px; }
  }

  .timeline-item {
    display: flex;
    gap: 1rem;
    margin-bottom: 0.5rem;
    position: relative;
  }

  .timeline-time {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--warm-mid);
    width: 44px;
    min-width: 44px;
    padding-top: 0.85rem;
    text-align: right;
    letter-spacing: 0.03em;
  }

  .timeline-dot {
    width: 16px;
    min-width: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 1rem;
    position: relative;
    z-index: 1;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--cream);
  }

  .timeline-item.highlight .dot {
    background: var(--accent);
    width: 12px;
    height: 12px;
  }

  .timeline-item.transport .dot {
    background: var(--warm-mid);
  }

  .timeline-card {
    flex: 1;
    padding: 0.8rem 1rem;
    border-radius: 6px;
    margin-bottom: 0.3rem;
  }

  .timeline-item.highlight .timeline-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
  }

  .timeline-item.transport .timeline-card {
    background: transparent;
    padding-left: 0;
  }

  .card-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.3rem;
    color: var(--ink);
  }

  .timeline-item.transport .card-title {
    font-weight: 400;
    font-size: 0.82rem;
    color: var(--warm-mid);
    font-style: italic;
  }

  .card-body {
    font-size: 0.85rem;
    line-height: 1.65;
    color: #4a3f30;
  }

  /* TIPS */
  .tip {
    margin-top: 0.7rem;
    padding: 0.7rem 0.9rem;
    border-radius: 4px;
    font-size: 0.82rem;
    line-height: 1.6;
  }

  .tip-info {
    background: #e8f4e8;
    border-left: 3px solid #4a7c4a;
    color: #2d4d2d;
  }

  .tip-warn {
    background: #fdf3e3;
    border-left: 3px solid var(--gold);
    color: #5c4210;
  }

  .tip-food {
    background: #fce8e4;
    border-left: 3px solid var(--accent);
    color: #5c1f10;
  }

  .tip-transport {
    background: #e8ecf8;
    border-left: 3px solid #4a5c9c;
    color: #1a2550;
  }

  .tip strong { font-weight: 600; }
  .tip-icon { margin-right: 0.3rem; }

  /* FOOD SECTION */
  .food-section {
    margin: 1.5rem 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .food-header {
    background: var(--accent);
    color: white;
    padding: 0.7rem 1.1rem;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .food-list { padding: 0.8rem 1.1rem; }

  .food-item {
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    line-height: 1.55;
  }

  .food-item:last-child { border-bottom: none; }

  .food-name {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.15rem;
  }

  .food-desc { color: #5a4a36; }

  .food-price {
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 500;
    margin-top: 0.15rem;
  }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2rem 0 1.5rem;
    color: var(--warm-mid);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* BADGE */
  .badge {
    display: inline-block;
    padding: 0.18rem 0.55rem;
    border-radius: 3px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .badge-free { background: #d4edda; color: #155724; }
  .badge-paid { background: #f8d7da; color: #721c24; }
  .badge-must { background: #fff3cd; color: #856404; }

  /* NAV ARROWS */
  .nav-arrows {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .nav-arrow {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--ink);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }
  .nav-arrow:hover { border-color: var(--accent); background: white; }
  .nav-arrow:disabled { opacity: 0.3; cursor: default; }
  .nav-arrow-label { font-size: 0.68rem; color: var(--warm-mid); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.2rem; }
  .nav-arrow.next { text-align: right; align-items: flex-end; }
  .nav-arrow-name { font-weight: 600; }

  @media (max-width: 480px) {
    .day-nav { justify-content: flex-start; }
    .main { padding: 1.5rem 1rem 3rem; }
    .timeline::before { left: 40px; }
    .timeline-time { width: 38px; min-width: 38px; font-size: 0.68rem; }
  }
</style>
</head>

// Build navigation
const navInner = document.getElementById('dayNavInner');
const mainContent = document.getElementById('mainContent');

days.forEach((day, idx) => {
  const btn = document.createElement('button');
  btn.className = 'day-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = `${day.emoji} ${day.label} — ${day.city}`;
  btn.dataset.idx = idx;
  btn.addEventListener('click', () => showDay(idx));
  navInner.appendChild(btn);
});

function buildDayHTML(day, idx) {
  const eventsHTML = day.events.map(ev => {
    const isHighlight = ev.type === 'highlight';
    const tipsHTML = (ev.tips || []).map(t => `
      <div class="tip tip-${t.type}">
        <span class="tip-icon">${{info:'ℹ️', warn:'⚠️', food:'🍽️', transport:'🚇', must:'⭐'}[t.type]||'💡'}</span>
        ${t.text}
      </div>
    `).join('');
    return `
      <div class="timeline-item ${isHighlight ? 'highlight' : 'transport'}">
        <div class="timeline-time">${ev.time}</div>
        <div class="timeline-dot"><div class="dot"></div></div>
        <div class="timeline-card">
          <div class="card-title">${ev.title}</div>
          ${ev.body ? `<div class="card-body">${ev.body}${tipsHTML}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  const foodHTML = day.food ? `
    <div class="food-section">
      <div class="food-header">${day.food.title}</div>
      <div class="food-list">
        ${day.food.items.map(f => `
          <div class="food-item">
            <div class="food-name">${f.name}</div>
            <div class="food-desc">${f.desc}</div>
            ${f.price ? `<div class="food-price">💰 ${f.price}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  const prevDay = idx > 0 ? days[idx-1] : null;
  const nextDay = idx < days.length-1 ? days[idx+1] : null;

  return `
    <div class="day-header">
      <div class="day-label">Dia ${day.id} de 15 • ${day.emoji} ${day.city}</div>
      <h2 class="day-title">${day.title}</h2>
      <div class="day-date">${day.date}</div>
    </div>
    ${day.intro ? `<div class="day-intro">${day.intro}</div>` : ''}
    <div class="timeline">${eventsHTML}</div>
    <div class="section-divider">Gastronomia do dia</div>
    ${foodHTML}
    <div class="nav-arrows">
      <button class="nav-arrow prev" onclick="showDay(${idx-1})" ${!prevDay?'disabled':''}>
        <span class="nav-arrow-label">← Dia anterior</span>
        <span class="nav-arrow-name">${prevDay ? prevDay.emoji+' '+prevDay.city : ''}</span>
      </button>
      <button class="nav-arrow next" onclick="showDay(${idx+1})" ${!nextDay?'disabled':''}>
        <span class="nav-arrow-label">Próximo dia →</span>
        <span class="nav-arrow-name">${nextDay ? nextDay.emoji+' '+nextDay.city : ''}</span>
      </button>
    </div>
  `;
}

// Pre-render all days
days.forEach((day, idx) => {
  const panel = document.createElement('div');
  panel.className = 'day-panel' + (idx === 0 ? ' active' : '');
  panel.id = `day-${idx}`;
  panel.innerHTML = buildDayHTML(day, idx);
  mainContent.appendChild(panel);
});

function showDay(idx) {
  if (idx < 0 || idx >= days.length) return;
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`day-${idx}`).classList.add('active');
  document.querySelectorAll('.day-btn')[idx].classList.add('active');

  // Scroll nav button into view
  const activeBtn = document.querySelectorAll('.day-btn')[idx];
  activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
