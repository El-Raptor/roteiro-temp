<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --s1:#111118;
  --s2:#16161f;
  --b1:rgba(255,255,255,0.07);
  --b2:rgba(255,255,255,0.13);
  --t:rgb(240,238,232);
  --td:rgba(240,238,232,0.5);
  --tdd:rgba(240,238,232,0.28);
  --ac:#e8c96a;
  --glow:rgba(232,201,106,0.18);
}
html{scroll-behavior:smooth}
body{font-family:'Geist Mono',monospace;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.7}

.tb{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1)}
.tb-i{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:1.2rem;height:54px;padding:0 1.5rem}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ac);white-space:nowrap;flex-shrink:0}
.logo b{color:var(--tdd);font-weight:400}
.tabs{display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none;flex:1;padding:.35rem 0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:transparent;border:1px solid transparent;color:var(--tdd);padding:.28rem .7rem;border-radius:100px;font-family:'Geist Mono',monospace;font-size:.65rem;cursor:pointer;white-space:nowrap;transition:all .15s ease;letter-spacing:.03em}
.tab:hover{color:var(--td);border-color:var(--b2);background:rgba(255,255,255,.04)}
.tab.on{background:var(--ac);border-color:var(--ac);color:#0a0a0f;font-weight:600}

.main{max-width:960px;margin:0 auto;padding:3rem 1.5rem 6rem}
.dp{display:none}
.dp.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.hero{margin-bottom:2.5rem}
.hero-meta{display:flex;align-items:center;gap:.65rem;margin-bottom:.9rem;flex-wrap:wrap}
.dayn{font-family:'Geist Mono',monospace;font-size:.62rem;color:var(--ac);letter-spacing:.16em;text-transform:uppercase;background:rgba(232,201,106,.09);border:1px solid rgba(232,201,106,.2);padding:.22rem .6rem;border-radius:100px}
.dated{font-family:'Geist Mono',monospace;font-size:.62rem;color:var(--tdd);letter-spacing:.05em}
.htitle{font-family:'Instrument Serif',serif;font-size:clamp(2rem,6vw,3.8rem);line-height:1.05;letter-spacing:-.02em;margin-bottom:.4rem}
.htitle em{font-style:italic;color:var(--ac)}
.hcity{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--tdd)}
.intro{margin-top:1.3rem;background:linear-gradient(135deg,rgba(232,201,106,.055),rgba(91,143,168,.055));border:1px solid var(--b1);border-radius:14px;padding:1.1rem 1.3rem;font-size:.82rem;line-height:1.78;color:rgba(240,238,232,.72);position:relative;overflow:hidden}
.intro::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,201,106,.4),transparent)}

.grid{display:grid;grid-template-columns:1fr;gap:2rem}
@media(min-width:720px){.grid{grid-template-columns:1fr 290px;gap:2rem}}

.slabel{font-family:'Geist Mono',monospace;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tdd);margin:0 0 1.2rem;display:flex;align-items:center;gap:.7rem}
.slabel::after{content:'';flex:1;height:1px;background:var(--b1)}

/* TIMELINE */
.tl{}
.ti{display:flex;margin-bottom:1px;position:relative}
.tl-l{width:48px;min-width:48px;display:flex;flex-direction:column;align-items:flex-end;padding-right:8px;padding-top:16px}
.tl-t{font-family:'Geist Mono',monospace;font-size:.6rem;color:var(--tdd);letter-spacing:.04em;line-height:1}
.tl-lv{width:1px;flex:1;min-height:10px;background:var(--b1);margin-top:4px;align-self:center;margin-left:auto}
.tl-m{width:20px;min-width:20px;display:flex;flex-direction:column;align-items:center;padding-top:18px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--s2);border:1.5px solid var(--b2);flex-shrink:0}
.ti.hl .dot{width:9px;height:9px;background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px var(--glow)}
.ti.tr .dot{background:transparent;border-color:rgba(255,255,255,0.12)}
.ti.dep .dot{width:7px;height:7px;background:rgba(91,143,168,0.4);border-color:rgba(91,143,168,0.5)}
.tl-lv2{width:1px;flex:1;min-height:10px;background:var(--b1);margin-top:3px}
.tb2{flex:1;padding:9px 0 9px 11px}
.ti.hl .tb2{padding:0 0 7px 11px}

/* HIGHLIGHT CARD */
.hc{background:var(--s1);border:1px solid var(--b1);border-radius:13px;padding:.9rem 1rem;transition:border-color .2s,box-shadow .2s}
.hc:hover{border-color:var(--b2);box-shadow:0 4px 28px rgba(0,0,0,.35)}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.45rem;margin-bottom:.38rem}
.hc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.01em;line-height:1.3;color:var(--t)}
.bgs{display:flex;gap:.25rem;flex-wrap:wrap;flex-shrink:0}
.bg{font-family:'Geist Mono',monospace;font-size:.57rem;letter-spacing:.07em;text-transform:uppercase;padding:.16rem .45rem;border-radius:100px;white-space:nowrap}
.bg-free{background:rgba(90,158,111,.13);color:#80cf98;border:1px solid rgba(90,158,111,.22)}
.bg-paid{background:rgba(212,92,92,.1);color:#e87f7f;border:1px solid rgba(212,92,92,.18)}
.bg-must{background:rgba(232,201,106,.1);color:var(--ac);border:1px solid rgba(232,201,106,.18)}
.hc-body{font-size:.78rem;line-height:1.72;color:rgba(240,238,232,.62)}
.hc-body strong{color:var(--t);font-weight:600}
.hc-body em{color:var(--ac);font-style:italic}

/* TRANSPORT ROW */
.tr-row{padding:.28rem 0;font-size:.72rem;color:rgba(160,195,215,.7);font-style:italic;line-height:1.5}

/* DEPARTURE ROW */
.dep-row{padding:.28rem 0;font-size:.72rem;color:rgba(240,238,232,.35);line-height:1.5}

/* TIPS */
.tip{margin-top:.6rem;padding:.62rem .8rem;border-radius:9px;font-size:.75rem;line-height:1.65;display:flex;gap:.45rem}
.ti-icon{flex-shrink:0;font-size:.78rem;line-height:1.65}
.ti-c{flex:1}
.ti-c strong{font-weight:600}
.tip-info{background:rgba(91,143,168,.09);border:1px solid rgba(91,143,168,.14);color:rgba(175,208,224,.88)}
.tip-warn{background:rgba(196,107,58,.09);border:1px solid rgba(196,107,58,.16);color:rgba(228,182,145,.9)}
.tip-food{background:rgba(156,120,68,.09);border:1px solid rgba(196,155,80,.14);color:rgba(228,200,145,.88)}
.tip-transport{background:rgba(91,143,168,.07);border:1px solid rgba(91,143,168,.12);color:rgba(160,195,215,.88)}
.tip-must{background:rgba(232,201,106,.07);border:1px solid rgba(232,201,106,.14);color:rgba(238,222,155,.9)}

/* SIDEBAR FOOD */
.fc{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;position:sticky;top:68px}
.fc-h{padding:.8rem 1rem;border-bottom:1px solid var(--b1)}
.fc-hl{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--td)}
.fl{padding:.4rem 0;max-height:calc(100vh - 180px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b1) transparent}
.fi{padding:.68rem 1rem;border-bottom:1px solid var(--b1);transition:background .12s}
.fi:last-child{border-bottom:none}
.fi:hover{background:var(--s2)}
.fn{font-family:'Syne',sans-serif;font-size:.74rem;font-weight:700;color:var(--t);margin-bottom:.22rem;line-height:1.3}
.fd{font-size:.72rem;line-height:1.58;color:var(--tdd)}
.fp{margin-top:.28rem;font-family:'Geist Mono',monospace;font-size:.64rem;color:var(--ac);letter-spacing:.04em}

.fc-mob{display:none;background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-top:1.8rem}
@media(max-width:719px){.fc-mob{display:block}.sidebar{display:none}}

.dn{display:flex;gap:.65rem;margin-top:2.5rem;padding-top:1.8rem;border-top:1px solid var(--b1)}
.nb{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:.85rem 1rem;cursor:pointer;transition:all .18s;text-align:left;font-family:'Geist Mono',monospace}
.nb:hover:not(:disabled){border-color:var(--b2);background:var(--s2)}
.nb:disabled{opacity:.22;cursor:default}
.nb.nr{text-align:right}
.nb-l{font-size:.58rem;color:var(--tdd);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.25rem}
.nb-n{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;color:var(--td)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

@media(max-width:600px){.main{padding:1.8rem .9rem 5rem}.htitle{font-size:clamp(1.7rem,8vw,2.8rem)}}
</style>
</head>

  {tr:1,time:"15:01",title:"🚇 Metrô linha 8 → Nuevos Ministérios"},

  {dep:1,time:"19:15",title:"🚶 Saída do Parque do Retiro → +20 min a pé até o Edifício Metrópolis"},
  {hl:1,time:"19:35",title:"🏢 Edifício Metrópolis",body:"O prédio mais fotografado de Madrid, na esquina da Calle Alcalá com Gran Vía. Fique na calçada oposta para a melhor foto com a cúpula de cobre verde."},

  {dep:1,time:"20:05",title:"🚶 +5 min a pé até a Plaza Mayor"},

  {dep:1,time:"11:35",title:"🚶 Saída do castelo → +10 min a pé até a Piazza Navona"},

  {hl:1,time:"12:30",title:"🍝 Almoço — Região do Pantheon",body:"Afaste-se 2–3 quarteirões da piazza para preços mais honestos. Veja as sugestões ao lado."},
  {tr:1,time:"~13:50",title:"🚶 Deslocamento a pé ou de táxi/Uber até o Coliseu"},
  {hl:1,time:"14:10",title:"🏟️ Coliseu",bgs:["paid"],body:"O anfiteatro mais famoso do mundo, capacidade original para 50.000 espectadores. Arena de gladiadores e lutas de animais.",tips:[{t:"warn",i:"⚠️",x:"Reserve online antecipadamente — as filas são enormes. Ingresso combinado inclui o Foro Romano."},{t:"info",i:"ℹ️",x:"As galerias subterrâneas e arquibancadas superiores têm ingresso especial."}]},
  {dep:1,time:"15:40",title:"🚶 Saída do Coliseu → +5 min a pé até o Foro Romano"},
  {hl:1,time:"15:45",title:"🏛️ Foro Romano",body:"O coração da Roma Antiga — centro político, religioso e comercial por séculos. O Arco de Tito e o Templo de Saturno são destaques. Incluso no combo do Coliseu.",tips:[{t:"info",i:"ℹ️",x:"Suba ao Palatino se a energia permitir — a vista do Foro de cima é deslumbrante e está inclusa no ingresso."}]},
  {dep:1,time:"16:25",title:"🚶 Saída do Foro Romano → +15 min a pé até a Fontana di Trevi"},
  {hl:1,time:"16:40",title:"⛲ Fontana di Trevi",body:"A maior fonte barroca do mundo (1762). Segundo a tradição, jogue uma moeda por cima do ombro esquerdo com a mão direita para garantir o retorno a Roma."},
  {dep:1,time:"17:00",title:"🚶 +13 min a pé até a Escadaria Espanhola"},
  {hl:1,time:"17:13",title:"🪜 Scalinata di Trinità dei Monti — Escadaria Espanhola",body:"138 degraus construídos em 1725. Ao entardecer a luz dourada é cinematográfica.",tips:[{t:"warn",i:"⚠️",x:"É <strong>proibido sentar nos degraus</strong> — multa de ~€400. Suba até a chiesa no topo para uma vista panorâmica de Roma."}]},
  {dep:1,time:"17:40",title:"🚶 +15 min a pé até a Piazza del Popolo"},
  {hl:1,time:"17:55",title:"🌇 Piazza del Popolo",body:"Uma das maiores praças de Roma. Dois obeliscos, três igrejas e a antiga entrada norte da cidade. Suba ao terraço do <strong>Pincio</strong> pela rampa lateral para a panorâmica mais épica de Roma ao pôr do sol — às <strong>20:06</strong>.",tips:[{t:"food",i:"🍽️",x:"Tome um gelato aqui enquanto o sol se põe. Merecido após 10km+ de paralelepípedo romano!"}]},
],
food:[
  {n:"Che Pasta (Via di S. Agostino, 16)",d:"Veja a massa fresca sendo feita pela janela. Entre o Pantheon e a Piazza Navona. Carbonara e cacio e pepe são destaques.",p:"€6–10"},
  {n:"Ristorante Phanta Rei (Via della Minerva, 18/19)",d:"Escondido atrás do Pantheon em uma viela — afasta os turistas. Porções generosas, qualidade italiana.",p:"€10–12"},
  {n:"Taverna del Seminario (Via del Seminario, 105)",d:"Menu fechado completo: bruschetta + massa + prato principal + sobremesa.",p:"€15 menu completo"},
  {n:"Forno Roscioli — Pizza Bianca (Via dei Chiavari, 21)",d:"Padaria-instituição romana. Pizza grossa, macia por dentro e crocante por fora. ~10 min a pé do Pantheon. Coma de pé.",p:"€3–5"},
  {n:"Nasoni — Água potável gratuita",d:"Fontes de água potável espalhadas pelo centro histórico de Roma. Use à vontade, especialmente no calor.",p:"Gratuito"},
]},

{id:3,city:"Munique",em:"🇩🇪",date:"Qua, 29 abr 2026",t1:"Capital",t2:"da Bavária",ti:0,
intro:"Vocês deixam a Itália e voam para Munique — a cidade das cervejas, dos museus de classe mundial e do Bayern de Munique. A chegada é de manhã, com tempo para o BMW Museum e a lendária Allianz Arena.",
ev:[
  {dep:1,time:"05:15",title:"🚗 Saída do hotel → estação Termini de Uber"},
  {tr:1,time:"05:50",title:"🚆 Leonardo Express → Aeroporto de Roma"},
  {hl:1,time:"06:22",title:"✈️ Aeroporto Internacional de Roma — check-in",body:"Embarque para Munique."},
  {hl:1,time:"09:05",title:"🛬 Chegada em Munique (MUC)",body:"Do aeroporto, S-Bahn S8 direto para o centro.",tips:[{t:"transport",i:"🚇",x:"<strong>S-Bahn S8:</strong> Estação Flughafen München → Karlplatz (~40 min). Compre um Tageskarte (bilhete diário) — cobre todos os transportes públicos de Munique."}]},
  {tr:1,time:"09:35",title:"🚆 S-Bahn S8 → Karlplatz (+10 min a pé até o hotel)"},
  {hl:1,time:"10:31",title:"🏨 Hotel Sendlinger Tor",body:"Excelente localização — a poucos minutos a pé da Marienplatz e do Viktualienmarkt. Compras ou descanso no hotel. Kikz Stachus fica ali perto."},
  {dep:1,time:"12:00",title:"🚶 Saída do hotel → +4 min a pé até a estação Sendlinger Tor"},
  {tr:1,time:"12:04",title:"🚇 U-Bahn linha U3 → Olympiazentrum (+6 min a pé)"},
  {hl:1,time:"12:24",title:"🚗 BMW Museum",bgs:["paid"],body:"Um dos museus de design industrial mais bonitos do mundo. Arquitetura futurista tão impressionante quanto os carros — história da BMW desde 1916.",tips:[{t:"info",i:"ℹ️",x:"Ingresso ~€10. O BMW Welt ao lado é <strong>gratuito</strong> e também espetacular. Reserve ~1h30 no total."}]},
  {hl:1,time:"13:50",title:"🍽️ Almoço perto do BMW Museum ou da Allianz Arena",body:"Aproveite a região para comer antes de ir ao estádio."},
  {dep:1,time:"15:05",title:"🚶 +7 min a pé até a estação Olympiazentrum"},
  {tr:1,time:"15:12",title:"🚇 U-Bahn linha U3 → Giselastraße"},
  {tr:1,time:"15:24",title:"🚇 U-Bahn linha U6 → Fröttmaning (+15 min a pé até o estádio)"},
  {hl:1,time:"15:51",title:"🔴 Allianz Arena — Tour",bgs:["paid"],body:"A catedral do futebol bávaro, o estádio do Bayern de Munique. O tour inclui vestiários, campo e área de imprensa. <strong>Última entrada para o tour: 17:15. Museu fecha às 18:00.</strong>"},
  {dep:1,time:"17:40",title:"🚶 Saída da Allianz Arena → +15 min a pé até a estação Fröttmaning"},
  {tr:1,time:"17:55",title:"🚇 U-Bahn linha U6 → Marienplatz (+7 min a pé)"},
  {hl:1,time:"18:18",title:"🥩 Viktualienmarkt — Jantar",bgs:["must"],body:"O mercado gastronômico mais famoso de Munique. Jante por aqui — biergarten central, salsichas, pretzel e cerveja bávara.",tips:[{t:"food",i:"🍽️",x:"<strong>Peça:</strong> Weisswurst com mostarda doce + pretzel, Obatzda (queijo cremoso com cerveja), Weißbier gelado."}]},
],
food:[
  {n:"Weisswurst + Pretzel",d:"Salsicha branca bávara — suga-se a carne para fora da pele, com mostarda doce. Tradição sagrada da Bavária.",p:"€4–6"},
  {n:"Obatzda",d:"Patê cremoso de queijo bávaro com cerveja e cebolinha. Servido com pretzel. Imperdível.",p:"€4–6"},
  {n:"Biergarten do Viktualienmarkt",d:"O único biergarten do centro que serve alternadamente as 6 grandes cervejarias de Munique.",p:"€5–8 a cerveja"},
  {n:"Döner Kebab",d:"Munique tem excelentes kebabs turcos — rápido, barato e muito bom.",p:"€5–7"},
]},

{id:4,city:"Alps Road Trip",em:"🏔️",date:"Qui, 30 abr 2026",t1:"Castelos,",t2:"Alpes & Innsbruck",ti:0,
intro:"O dia mais épico da viagem! Road trip pelos Alpes: Füssen, o Castelo de Neuschwanstein (que inspirou a Disney), parada na fronteira austríaca para a Zugspitze e Innsbruck com teleférico até as montanhas nevadas.",
ev:[
  {dep:1,time:"06:40",title:"🚶 Saída do hotel → +4 min a pé até a estação Sendlinger Tor"},
  {tr:1,time:"06:44",title:"🚇 U-Bahn linha U1 → München Hauptbahnhof (+5 min a pé até a Alamo)"},
  {hl:1,time:"06:51",title:"🚗 Alamo — Retirada do carro",body:"A loja abre às 7h. Segundo o e-mail, acesso pela loja Telnet Handy Reparatur ao lado. <strong>Avise obrigatoriamente que vão cruzar a fronteira com a Áustria.</strong> Pergunte sobre correntes de neve e como devolver o carro fora do horário.",tips:[{t:"warn",i:"⚠️",x:"<strong>Vignette austríaca:</strong> Obrigatória nas autoestradas da Áustria. Compre pelo app ASFINAG antes (~€11,50/10 dias) ou fisicamente no posto com selo ASFINAG. Cole no canto superior esquerdo do para-brisa. Categoria B para carro."},{t:"transport",i:"🚇",x:"<strong>Velocidades:</strong> Área urbana: 50km/h. B12 (não-autobahn): máx 100km/h. A96 (autobahn): 130km/h recomendado, muitos trechos sem limite."}]},
  {tr:1,time:"07:20",title:"🚗 Saída de Munique → A96 e B12 → 159km"},
  {hl:1,time:"09:50",title:"🏘️ Füssen — Centrinho histórico",body:"Cidade bávara de conto de fadas. Casinhas estilo enxaimel e o <strong>Hohe Schloss</strong> (Castelo Alto, 1291–1505) visível acima das casas. Passe pela Igreja St. Mang. Nenhum dos dois castelos serão visitados por dentro.",tips:[{t:"food",i:"🍽️",x:"<strong>Coma aqui!</strong> Terão pouco tempo para almoço depois. Bakery Höfler: Apfelstrudel (torta de maçã) e Schneeball. Melhor Schneeball de Füssen: <strong>Stefanie Diller Schneeballenträume</strong>. Também experimente Kaiserschmarrn (tiras de panqueca doce)."},{t:"warn",i:"⚠️",x:"Compre o Vignette austríaca no posto Lge Liquid Gas Energy na B17 ainda em Füssen se não comprou online."}]},
  {dep:1,time:"10:45",title:"🚗 Saída de Füssen → 7 min de carro até o Parkplatz P4"},
  {hl:1,time:"10:52",title:"🅿️ Parkplatz P4",body:"Estacione aqui. Este é o único estacionamento de onde parte o ônibus para os castelos.",tips:[{t:"info",i:"ℹ️",x:"<strong>Estacionamentos:</strong> APCOA Morisse Parking (até 30min: €1, hora: €2, diário: €15 — cartão crédito) ou Tiefgarage City Sparkassenhaus APCOA (€2,50/hora, máx €17/dia). Opção gratuita: igreja na entrada da cidade, mas são ~20 min a pé."}]},
  {tr:1,time:"11:00",title:"🚌 Ônibus do castelo → ponto Marienbrücke (+3 min a pé até a ponte)"},
  {hl:1,time:"11:18",title:"🌉 Ponte Marienbrücke",bgs:["must"],body:"A <strong>vista mais fotogênica do Castelo Neuschwanstein</strong> — você o vê de cima, emoldurado pelo vale e pelas montanhas bávara.",tips:[{t:"info",i:"ℹ️",x:"Ônibus: €3,50 a ida / €5 ida e volta. Pague em dinheiro no ônibus ou com cartão no Bus Depot ao lado do P4. O ônibus passa a cada 20 minutos."}]},
  {dep:1,time:"11:30",title:"🚶 +8 min a pé descendo em direção ao Jugend"},
  {hl:1,time:"11:38",title:"👀 Jugend — Vista panorâmica",body:"Plataforma com vista incrível para o vale e o <strong>Castelo Hohenschwangau</strong>. Não pule este ponto!"},
  {dep:1,time:"11:43",title:"🚶 +7 min a pé até o Castelo Neuschwanstein"},
  {hl:1,time:"11:50",title:"🏰 Castelo Neuschwanstein",body:"O castelo que inspirou a Disney, construído pelo Rei Luís II da Bavária. Vocês não vão entrar — cheguem à entrada para sentir a escala e a magia de perto."},
  {dep:1,time:"12:05",title:"🚶 Saída → +15 min subindo de volta até o ponto Marienbrücke"},
  {tr:1,time:"12:20",title:"🚌 Ônibus → desça no Parkplatz P4 (+5 min a pé até o Alpsee)"},
  {hl:1,time:"12:40",title:"🏞️ Alpsee",body:"Lago de montanha cristalino com vista para os castelos ao fundo. Perfeito para fotos e para respirar o ar alpino.",tips:[{t:"info",i:"ℹ️",x:"Se perder o ônibus na Marienbrücke (passa a cada 20 min), vá direto ao Alpsee enquanto aguarda o próximo."}]},
  {dep:1,time:"12:55",title:"🚗 Saída de Füssen/Schwangau → B179 em direção à Áustria"},
  {tr:1,time:"13:00",title:"🚗 B179 → 37,9km até Leermos, Áustria"},
  {hl:1,time:"13:40",title:"🏔️ Leermos, Áustria — Zugspitze",body:"Pare no posto <strong>Shell</strong> próximo à <em>Eisenbahnbrücke Ehrwald</em> e estacione para fotografar a impressionante <strong>Zugspitze</strong> (2.962m) — o pico mais alto da Alemanha.",tips:[{t:"transport",i:"🚇",x:"<strong>Limite na B179 (Áustria):</strong> 100km/h fora das cidades, 50km/h em zonas urbanas."}]},
  {dep:1,time:"14:00",title:"🚗 Saída de Leermos → B179 + Inntal Autobahn/E60 (pedágio) → 77,4km"},
  {hl:1,time:"15:10",title:"🚗 Chegada em Innsbruck",body:"Estacione no <strong>Altstadtgarage</strong> (~€3,40/hora, máx €19/dia).",tips:[{t:"warn",i:"⚠️",x:"<strong>Limite na A12 (Áustria):</strong> 130km/h diurno, 100km/h das 22h às 5h. Zonas IG-L (controle de poluição): 100km/h."},{t:"warn",i:"⚠️",x:"Cuidado com a sinalização! Placas indicam zonas de pedestres — circulação de veículos proibida."}]},
  {hl:1,time:"15:30",title:"🏙️ Praça da Cidade — Marktplatz",body:"Logo acima da garagem, fotografe o cartão-postal mais icônico de Innsbruck: as casas coloridas do bairro <strong>Mariahilf</strong> refletidas no rio Inn de cor esmeralda. O rio Inn dá nome à cidade — Innsbruck significa 'Ponte sobre o Inn'."},
  {dep:1,time:"15:35",title:"🚶 +5 min a pé até o Distrito Histórico (Altstadt)"},
  {hl:1,time:"15:40",title:"🏘️ Altstadt — Distrito Histórico",body:"Centro histórico medieval de Innsbruck. O <strong>Goldenes Dachl</strong> (Telhado Dourado) é o símbolo da cidade — varanda coberta com 2.657 telhas de cobre dourado, encomendada pelo Imperador Maximiliano I no séc. XV."},
  {dep:1,time:"15:45",title:"🚶 +5 min a pé até o Marktplatz"},
  {hl:1,time:"15:50",title:"📸 Marktplatz",body:"Vista das casas coloridas do bairro Mariahilf refletidas no rio Inn esmeralda."},
  {dep:1,time:"15:55",title:"🚶 +8 min a pé até a estação Altstadt → compra de ingresso para o Seegrube"},
  {tr:1,time:"~16:10",title:"🚡 Hungerburgbahn (estação Altstadt) → Hungerburg → teleférico → Seegrube"},
  {hl:1,time:"16:40",title:"🚡 Seegrube — Nordkette (2.256m)",bgs:["must"],body:"Compre o ingresso <strong>Top of Innsbruck</strong> na estação Altstadt. Neve garantida em maio, vista épica da cidade lá embaixo. Opcionalmente, suba até o topo no Hafelekarspitze.",tips:[{t:"warn",i:"⚠️",x:"Leve casaco — faz frio lá em cima mesmo em maio."},{t:"food",i:"🍽️",x:"Comer no topo é possível, mas o preço é alto. Melhor jantar ao descer em Innsbruck."}]},
  {dep:1,time:"20:00",title:"🚡 Saída do Seegrube → retorno de teleférico até o carro"},
  {dep:1,time:"20:20",title:"🚗 Saída de Innsbruck → A95 e B2 → 148km até Munique"},
  {hl:1,time:"22:15",title:"🚗 Hauptbahnhof — Devolução do carro",body:"Devolva o carro na Alamo. Se a loja estiver fechada, sigam as instruções de onde parar e deixar a chave.",tips:[{t:"warn",i:"⚠️",x:"Saiam de Innsbruck às 21h no máximo para dar tempo de abastecer o carro perto de Munique antes da devolução (prazo: 23:30)."}]},
],
food:[
  {n:"Füssen — Bakery Höfler / Stefanie Diller",d:"Café reforçado antes dos castelos. Apfelstrudel, Schneeball e Kaiserschmarrn. Melhor Schneeball: Stefanie Diller Schneeballenträume.",p:"€4–8"},
  {n:"Innsbruck — Würstelstand (barraca de salsichas)",d:"Salsichas quentes austríacas com mostarda e pão. Rápido, típico e barato.",p:"€3–5"},
  {n:"Innsbruck — Döner Kebab",d:"Opção rápida antes de subir no teleférico.",p:"€5–7"},
]},

{id:5,city:"Munique",em:"🏛️",date:"Sex, 1 mai 2026",t1:"Munique",t2:"Histórica",ti:0,
intro:"Último dia em Munique antes de voar para Amsterdã à tarde. Englischer Garten com surfistas no canal, Marienplatz histórica, a famosa Hofbräuhaus e a exuberante Asamkirche.",
ev:[
  {dep:1,time:"08:30",title:"🚶 Saída do hotel → +4 min a pé até a estação Sendlinger Tor"},
  {tr:1,time:"08:34",title:"🚇 U-Bahn linha U3 → Odeonplatz (+10 min a pé até o Englischer Garten)"},
  {hl:1,time:"08:47",title:"🌳 Englischer Garten",bgs:["must"],body:"Maior que o Central Park. Comece pela <strong>Eisbachwelle</strong> — o canal onde bávaros surfam o ano inteiro. Depois siga ao <strong>Monopteros</strong> (templo grego no alto de uma colina) e ao <strong>Biergarten am Chinesischen Turm</strong> (pagoda chinesa).",tips:[{t:"info",i:"ℹ️",x:"Se quiserem tomar uma cerveja de manhã no biergarten — é completamente normal na Bavária e faz parte da experiência!"}]},
  {dep:1,time:"10:00",title:"🚶 Saída do Englischer Garten → +10 min a pé até a Odeonplatz"},
  {hl:1,time:"10:10",title:"🏛️ Odeonplatz",body:"Praça histórica onde Hitler fracassou no Putsch de 1923. A <strong>Feldherrnhalle</strong> virou santuário nazista no III Reich. O rastro de pedras douradas na <strong>Viscardigasse</strong> (Beco dos Desertores) homenageia quem desviava para não fazer a saudação nazista.",tips:[{t:"info",i:"ℹ️",x:"A <strong>Theatinerkirche</strong> ao lado é a 1ª igreja barroca da Bavária. A <strong>Residenz München</strong> (antigo palácio real, agora museu) também fica aqui."}]},
  {dep:1,time:"10:25",title:"🚶 +9 min a pé até a Hofbräuhaus"},
  {hl:1,time:"10:34",title:"🍺 Hofbräuhaus",body:"A cervejaria mais famosa do mundo, fundada em 1589 pelo Duque Guilherme V. Durante a Guerra dos 30 anos, Munique foi poupada em troca de 600.000 litros desta cerveja. Pelo tempo curto no roteiro, apenas passe em frente.",tips:[{t:"info",i:"ℹ️",x:"A cerveja ainda segue a <em>Reinheitsgebot</em> (Lei da Pureza da Bavária de 1516): apenas água, malte, lúpulo e levedura."}]},
  {dep:1,time:"10:42",title:"🚶 +5 min a pé até a Marienplatz"},
  {hl:1,time:"10:47",title:"⭐ Marienplatz",bgs:["must"],body:"O coração de Munique desde 1158. O <strong>carrilhão do Neues Rathaus toca às 11h e 12h</strong> — bonecos mecânicos dançam por 12 min! A <strong>Mariensäule</strong> de 1638 celebra o fim da ocupação sueca na Guerra dos 30 Anos.",tips:[{t:"warn",i:"⚠️",x:"Estejam na praça às 11h para ver o carrilhão!"}]},
  {hl:1,time:"11:10",title:"⛪ St. Peter Kirche",bgs:["paid"],body:"A torre de 91m tem uma das melhores vistas de Munique — em dias claros dá para ver os Alpes.",tips:[{t:"info",i:"ℹ️",x:"Subida ~€5, <strong>aceita apenas dinheiro.</strong> Mais de 300 degraus."}]},
  {dep:1,time:"12:00",title:"🚶 Saída da St. Peter → +4 min a pé até o Viktualienmarkt"},
  {hl:1,time:"11:54",title:"🥩 Viktualienmarkt — Almoço",bgs:["must"],body:"O mercado gastronômico mais famoso de Munique. O <strong>Maibaum</strong> (Mastro de Maio) no centro é um ícone. Biergarten rotativo servindo alternadamente as 6 grandes cervejarias de Munique.",tips:[{t:"food",i:"🍽️",x:"Weisswurst com pretzel e mostarda doce, Obatzda, Leberkäse (embutido frito em pão)."}]},
  {dep:1,time:"13:40",title:"🚶 Saída do Viktualienmarkt → +8 min a pé até a Asamkirche"},
  {hl:1,time:"13:48",title:"🕍 Asamkirche",bgs:["free"],body:"Igreja barroca dos irmãos Cosmas e Egid Asam (1746). Decoração tão densa que as paredes parecem respirar.",tips:[{t:"warn",i:"⚠️",x:"A porta fica fechada mas não está trancada — empurre com força. É só pesada."}]},
  {dep:1,time:"14:03",title:"🚶 +2 min a pé até o hotel"},
  {hl:1,time:"14:05",title:"🏨 Hotel am Sendlinger Tor — Prepare as malas",body:"Último momento no hotel antes da partida para o aeroporto."},
  {dep:1,time:"15:10",title:"🚶 +12 min a pé até a estação Karlsplatz"},
  {tr:1,time:"15:35",title:"🚆 S-Bahn linha S8 → Flughafen München (Aeroporto)"},
  {hl:1,time:"16:15",title:"✈️ Aeroporto de Munique — check-in",body:"Voo KL1856 às 17:45, chegada em Amsterdã às 19:20."},
  {tr:1,time:"19:41",title:"🚆 Intercity Direct 1873 → Amsterdam Centraal (+9 min a pé)"},
  {hl:1,time:"20:04",title:"🏨 Hotel Ben Centre — Amsterdã",body:"Bem-vindos à Holanda! Descansem — amanhã é dia de canais, Anne Frank e Heineken."},
],
food:[
  {n:"Weisswurst + Pretzel no Viktualienmarkt",d:"Com mostarda doce. O almoço bávaro mais clássico. Perfeito para o mercado.",p:"€4–7"},
  {n:"Obatzda com Weißbier",d:"Queijo cremoso bávaro com cerveja de trigo gelada no biergarten do mercado.",p:"€8–12"},
  {n:"Biergarten am Chinesischen Turm",d:"Cerveja bávara de manhã no Englischer Garten — completamente normal aqui!",p:"€5–8"},
]},

{id:6,city:"Amsterdã",em:"🇳🇱",date:"Sáb, 2 mai 2026",t1:"Canais,",t2:"Cerveja & Cultura",ti:1,
intro:"Amsterdã é uma cidade de canais, casas inclinadas e bicicletas por toda parte. Hoje: Casa de Anne Frank, Heineken Experience e um cruzeiro pelos canais.",
ev:[
  {dep:1,time:"10:20",title:"🚶 Saída do hotel → +6 min a pé até a Praça Dam"},
  {hl:1,time:"10:26",title:"🏛️ Praça Dam",body:"O coração de Amsterdã, em frente ao <strong>Palácio Real</strong> (ainda usado pela família real) e ao <strong>Nieuwe Kerk</strong>.",tips:[{t:"food",i:"🍽️",x:"Stroopwafel de uma banca de rua — um bom começo de manhã em Amsterdã."}]},
  {dep:1,time:"10:46",title:"🚶 +2 min a pé até o ponto Paleisstraat"},
  {tr:1,time:"10:49",title:"🚃 Bonde linha 2 → Nieuwezijds Kolk (+11 min a pé até o Winkel 43)"},
  {hl:1,time:"11:03",title:"🍎 Winkel 43 — Apple Taart",bgs:["must"],body:"A torta de maçã mais famosa de Amsterdã. A fila vale cada minuto. Peça com creme chantilly e um café.",tips:[{t:"food",i:"🍽️",x:"Torta de maçã: €5,70. Chegue cedo — a fila cresce bastante ao longo do dia."}]},
  {dep:1,time:"11:43",title:"🚶 +7 min a pé até a Casa de Anne Frank"},
  {hl:1,time:"11:50",title:"📖 Casa de Anne Frank (Apenas Exterior)",body:"O esconderijo onde Anne Frank e sua família viveram de 1942 a 1944. Como vocês não vão entrar no museu, vale a pena passear pelo belo canal Prinsengracht logo em frente e admirar a fachada histórica do prédio.",tips:[{t:"info",i:"ℹ️",x:"Aproveitem para tirar fotos da estátua de Anne Frank, que fica bem pertinho dali, na praça Westermarkt."}]},
  {tr:1,time:"13:26",title:"🚃 Bonde linha 4 do ponto Dam → Albert Cuypstraat (+8 min a pé)"},
  {hl:1,time:"13:43",title:"🍺 Heineken Experience",bgs:["paid"],body:"A fábrica original da Heineken, transformada em experiência imersiva. Aprenda a história da cerveja, veja os antigos tanques de fermentação e ganhe um copo no final. Inclui o cruzeiro pelos canais!",tips:[{t:"warn",i:"⚠️",x:"<strong>Reserva obrigatória!</strong> É necessário comprar e agendar o horário de entrada pelo site oficial antecipadamente."},{t:"info",i:"ℹ️",x:"~€23. Duração: 1h30–2h."}]},
  {dep:1,time:"15:40",title:"🚶 Saída da Heineken → +8 min a pé até o embarque do cruzeiro no Rijksmuseum"},
  {hl:1,time:"16:00",title:"⛵ Heineken Flagship Cruise",bgs:["paid"],body:"Cruzeiro de 1 hora pelos canais de Amsterdã — incluso com a Heineken. Embarque no <strong>Rijksmuseum</strong>.",tips:[{t:"warn",i:"⚠️",x:"<strong>Reserva obrigatória!</strong> O cruzeiro tem horários separados da Heineken Experience e também exige agendamento. Chegue 15 min antes do horário reservado."}]},
  {dep:1,time:"17:00",title:"🚶 Saída do barco → +12 min a pé até o mercado"},
  {hl:1,time:"17:12",title:"🛍️ Albert Cuypstraat Markt",bgs:["must"],body:"O maior mercado a céu aberto dos Países Baixos. Stroopwafels frescos, haring, souvenirs autênticos, frutas e roupas.",tips:[{t:"food",i:"🍽️",x:"<strong>Compre aqui:</strong> Stroopwafel quentinho fresco (muito melhor que os embalados), haring com cebola picada, patatje oorlog."}]},
  {dep:1,time:"18:53",title:"🚃 Bonde linha 4 do ponto Albert Cuypstraat → Dam (+3 min a pé até o hotel)"},
  {hl:1,time:"19:03",title:"🏨 Hotel Ben Centre — Descanso",body:"Pequena pausa antes da saída noturna."},
  {dep:1,time:"20:40",title:"🚶 Saída do hotel → +5 min a pé até o Red Light District"},
  {hl:1,time:"20:45",title:"🌙 Red Light District",body:"O famoso bairro à noite — ruelas medievais com canais e uma atmosfera única em Amsterdam.",tips:[{t:"warn",i:"⚠️",x:"<strong>Proibido fotografar</strong> as trabalhadoras nas janelas. Multa alta e possível confisco do celular."}]},
],
food:[
  {n:"Manneken Pis — Batatas fritas holandesas",d:"Fritas mais grossas que o habitual, servidas com maionese, satay ou outros molhos. Ícone da street food.",p:"€5–9"},
  {n:"Haring (arenque marinado)",d:"O prato mais típico da Holanda. Peixe cru com cebola picada e picles. Coma de cabeça para baixo como os holandeses!",p:"€4–6"},
  {n:"Stroopwafel fresco no mercado Albert Cuyp",d:"Dois wafels crocantes com xarope de caramelo quente no meio. Sempre melhor fresco e quentinho.",p:"€2–3"},
  {n:"Patatje Oorlog ('Batatas Guerra')",d:"Batatas fritas com maionese + molho de amendoim (satay) + cebola picada. Estranho mas viciante.",p:"€5–7"},
]},

{id:7,city:"Londres",em:"🇬🇧",date:"Dom, 3 mai 2026",t1:"Chegada",t2:"em Londres",ti:0,
intro:"Vocês chegam de Eurostar — o trem que passa sob o Canal da Mancha! Chegada ao meio-dia com bastante tempo para os principais pontos. Londres tem muitas atrações gratuitas e incríveis.",
ev:[
  {dep:1,time:"07:00",title:"🚶 Saída do hotel → +12 min a pé até a Centraal Station"},
  {tr:1,time:"08:17",title:"🚄 Eurostar → London Saint Pancras (chegada 11:57)"},
  {hl:1,time:"12:15",title:"⚡ Plataforma 9¾ — King's Cross",body:"A plataforma de Harry Potter na estação King's Cross! Instalação oficial com carrinho 'atravessando' a parede, cachecóis das casas de Hogwarts e loja exclusiva.",tips:[{t:"info",i:"ℹ️",x:"A loja vende produtos exclusivos — ótimo para souvenirs do universo HP."}]},
  {tr:1,time:"12:36",title:"🚌 Ônibus 63 do ponto King's Cross St. Pancras (Stop D) → St. George's Circus (Stop Y)"},
  {hl:1,time:"13:15",title:"🏨 Hotel Premier Inn Waterloo (Lambeth Road) — deixe as malas",body:"Deixem as malas e partam logo para aproveitar o dia."},
  {dep:1,time:"13:26",title:"🚇 Metrô Bakerloo → Charing Cross (+5 min a pé até a Trafalgar Square)"},
  {hl:1,time:"13:44",title:"🦁 Trafalgar Square — Almoço aqui",body:"A praça mais famosa de Londres. Leões de bronze e a Coluna de Nelson (52m). A <strong>National Gallery</strong> ao lado é gratuita e incrível.",tips:[{t:"food",i:"🍽️",x:"Pub ao redor para fish & chips ou bangers & mash. Ou Greggs/Pret A Manger para economizar."}]},
  {dep:1,time:"14:25",title:"🚶 +20 min a pé até o Buckingham Palace"},
  {hl:1,time:"14:45",title:"👑 Buckingham Palace",body:"A residência oficial da família real britânica. A fachada e os portões são impressionantes. A troca da guarda acontece às 11h."},
  {dep:1,time:"15:15",title:"🚶 +15 min a pé até a Westminster Abbey"},
  {hl:1,time:"15:30",title:"⛪ Westminster Abbey",bgs:["paid"],body:"A abadia onde reis são coroados e enterrados. Túmulos de Newton, Darwin, Chaucer e Dickens."},
  {dep:1,time:"15:40",title:"🚶 +5 min a pé até o Big Ben"},
  {hl:1,time:"15:45",title:"🕰️ Big Ben",body:"Para a foto clássica, fique na rua <strong>Great George St</strong> — enquadre a Torre Elizabeth com a cabine telefônica vermelha na frente. Ao invés de atravessar a ponte, tire a foto daqui.",tips:[{t:"info",i:"ℹ️",x:"'Big Ben' é tecnicamente só o sino dentro da Torre Elizabeth."}]},
  {dep:1,time:"16:00",title:"🚶 +8 min a pé até o Whitehall"},
  {hl:1,time:"16:08",title:"🐎 Whitehall — Guarda Real",body:"Tire uma foto com o guarda real. O guarda não pode interagir com ninguém — não chegue muito perto do cavalo, pois ele pode (e vai) gritar e pedir distância.",tips:[{t:"warn",i:"⚠️",x:"Mantenha distância do cavalo — ele pode morder."}]},
  {tr:1,time:"16:33",title:"🚌 Ônibus 26 do Horse Guards Parade → St. Paul's Cathedral"},
  {hl:1,time:"16:53",title:"⛪ St. Paul's Cathedral",body:"A catedral de Christopher Wren, construída após o Grande Incêndio de 1666. Após as fotos, vão ao shopping <strong>One New Change</strong> ao lado para o elevador panorâmico com vista gratuita para a catedral de um ângulo único.",},
  {tr:1,time:"17:25",title:"🚌 Ônibus 15 do ponto St. Paul's Cathedral → Monument (Stop H)"},
  {hl:1,time:"17:36",title:"🌿 Sky Garden",bgs:["free"],body:"Jardim suspenso no 35º andar com vista 360° de Londres. Reserve o horário das 17:30 ou 18h. Tolerância de 30 minutos de atraso.",tips:[{t:"warn",i:"⚠️",x:"Reserve antecipadamente em skygarden.london — gratuito mas esgota rapidamente."}]},
  {dep:1,time:"17:50",title:"🚶 +3 min a pé até o Leadenhall Market"},
  {hl:1,time:"18:00",title:"🏛️ Leadenhall Market",body:"Mercado vitoriano coberto de 1881 — aqui filmaram o <strong>Beco Diagonal</strong> de Harry Potter. Arcos coloridos e piso xadrez inconfundíveis."},
  {dep:1,time:"18:20",title:"🚌 Ônibus 15 do ponto Monument → Bedford Street (Stop J) (+7 min a pé)"},
  {hl:1,time:"18:48",title:"📚 Cecil Court — Beco Diagonal",body:"A inspiração real para o Beco Diagonal de Harry Potter. Ruelas medievais com livrarias antigas, antiquários e lojas de raridades."},
  {dep:1,time:"18:55",title:"🚶 +5 min a pé até a Leicester Square"},
  {hl:1,time:"19:00",title:"🎭 Leicester Square",body:"O coração do entretenimento londrino — cinemas, restaurantes e uma praça animada."},
  {dep:1,time:"19:15",title:"🚶 Ande até a Chinatown Gate"},
  {hl:1,time:"19:15",title:"🐉 Chinatown Gate",body:"O portão de entrada do bairro chinês de Londres — dim sum, pato laqueado e noodles.",tips:[{t:"food",i:"🍽️",x:"<strong>Jantar aqui:</strong> Fila do lado de fora = sinal de qualidade. Dim sum de arroz no vapor, pato laqueado ou noodles em restaurantes animados."}]},
  {dep:1,time:"19:25",title:"🚶 Ande até o Piccadilly Circus"},
  {hl:1,time:"19:25",title:"✨ Piccadilly Circus",body:"O Times Square londrino, com suas luzes de néon e energia constante."},
  {dep:1,time:"19:35",title:"🚶 +8 min a pé até a Carnaby Street"},
  {hl:1,time:"19:43",title:"🛍️ Carnaby Street",body:"A rua mais fashion de Londres desde os anos 60. Boutiques, cafés e arquitetura vitoriana com decoração contemporânea."},
],
food:[
  {n:"Greggs — Sausage Roll",d:"O pastelão de salsicha mais amado da Inglaterra. Quente, crocante, baratíssimo. Presente em toda a cidade.",p:"£1,50–3"},
  {n:"Fish & Chips num pub",d:"O prato nacional britânico: peixe empanado e frito com batatas grossas, vinagre de malte e sal.",p:"£10–15"},
  {n:"Pret A Manger",d:"Sanduíches, sopas e saladas frescas. Qualidade acima da média para fast-food.",p:"£5–9"},
  {n:"Chinatown — Dim Sum",d:"Melhor custo-benefício gastronômico de Londres. Fila rápida nas barracas da rua.",p:"£6–12"},
  {n:"Nando's",d:"Frango grelhado peri-peri em diferentes níveis de picância. Amado pelos ingleses.",p:"£12–15"},
]},

{id:8,city:"Londres",em:"🎡",date:"Seg, 4 mai 2026",t1:"Oxford Street,",t2:"Eye & Wembley",ti:0,
intro:"Dia de compras na rua mais famosa do mundo, roda-gigante às margens do Tâmisa e o estádio mais icônico do futebol inglês.",
ev:[
  {dep:1,time:"09:30",title:"🚶 Saída do Hotel Premier Inn"},
  {hl:1,time:"10:00",title:"🛍️ Oxford Street — Compras",body:"A rua de compras mais famosa do mundo. <strong>Primark</strong> (multiandar, baratíssimo), <strong>TK Maxx</strong> (marcas com desconto), <strong>Selfridges</strong> (luxo e gastronomia), <strong>UNIQLO</strong>, <strong>H&M</strong>.",tips:[{t:"warn",i:"⚠️",x:"O Primark da Oxford Street é enorme. Vá cedo para evitar filas nos provadores."}]},
  {tr:1,time:"12:02",title:"🚇 Metrô Bakerloo da Oxford Circus → Marylebone (+7 min a pé)"},
  {hl:1,time:"12:14",title:"🐟 The Seashell of Lisson Grove — Almoço",bgs:["must"],body:"Um dos melhores fish & chips de Londres. Incluso no London Pass — basta apresentar. Funciona das 12h às 17:30.",tips:[{t:"warn",i:"⚠️",x:"Funciona das 12h às 17:30. Não chegue depois das 17h."}]},
  {dep:1,time:"13:30",title:"🚶 Saída → +8 min a pé até a estação Marylebone"},
  {tr:1,time:"13:40",title:"🚇 Metrô Bakerloo → Waterloo (+7 min a pé até a London Eye)"},
  {hl:1,time:"14:00",title:"🎡 London Eye",bgs:["paid"],body:"A roda-gigante de 135m às margens do Tâmisa. Vista panorâmica 360° de Londres. A volta dura ~30 minutos.",tips:[{t:"warn",i:"⚠️",x:"Reserve pelo <strong>GO City App</strong> com até 15 dias de antecedência. Precisa do número do pedido e e-mail do passe."}]},
  {dep:1,time:"14:40",title:"🚶 +9 min a pé até a estação Waterloo"},
  {tr:1,time:"14:53",title:"🚇 Metrô Jubilee → Wembley Park (+13 min a pé)"},
  {hl:1,time:"15:32",title:"🏟️ Wembley Stadium — Tour",bgs:["paid"],body:"O estádio mais famoso do futebol inglês — Copa do Mundo de 1966 e os maiores shows do mundo. Tour com ~1h30.",tips:[{t:"info",i:"ℹ️",x:"London Pass inclui o tour — só mostrar o passe, sem necessidade de reserva. Pegue o horário das 16h."}]},
  {dep:1,time:"18:00",title:"🚶 Saída do Wembley"},
],
food:[
  {n:"The Seashell of Lisson Grove",d:"Incluso no passe. Um dos melhores fish & chips de Londres — com mushy peas (ervilhas amassadas).",p:"Incluso no passe"},
  {n:"Pub após o Wembley",d:"Shepherd's pie ou Sunday roast — o jantar britânico clássico.",p:"£12–18"},
  {n:"Greggs ou Pret A Manger",d:"Para lanches rápidos durante as compras ou entre as atrações.",p:"£3–8"},
]},

{id:9,city:"Londres",em:"⚽",date:"Ter, 5 mai 2026",t1:"Thames Cruise,",t2:"Torres & Arsenal",ti:0,
intro:"Cruzeiro pelo Tâmisa, Tower Bridge, estádio do Tottenham com F1 e a grande final: Arsenal em casa na Champions League!",
ev:[
  {hl:1,time:"10:30",title:"🍳 Bill's Soho — Café da manhã",body:"Incluso no London Pass. Café da manhã servido até as 11h — apareça, mostre o passe e será sentado.",tips:[{t:"warn",i:"⚠️",x:"Chegue até as 10:45 para garantir o café dentro do horário de encerramento às 11h."}]},
  {dep:1,time:"11:20",title:"🚶 Saída do Bill's Soho"},
  {hl:1,time:"12:00",title:"⛵ London Thames Cruise — 24 horas",body:"Cruzeiro panorâmico pelo rio Tâmisa. Apresente o passe para receber um passe de cruzeiro de <strong>24 horas</strong> — pode usar amanhã também!"},
  {hl:1,time:"12:40",title:"🏰 Tower Bridge e Torre de Londres",body:"Vista externa da Tower Bridge — uma das mais fotografadas do mundo — e da Torre de Londres, fortaleza medieval que ainda guarda as joias da coroa.",tips:[{t:"info",i:"ℹ️",x:"Vocês não vão entrar hoje — apenas admirar de fora e do barco."}]},
  {tr:1,time:"13:33",title:"🚌 Ônibus 42 do ponto Tower Bridge (Stop L) → Liverpool Street (+5 min a pé até o metrô)"},
  {tr:1,time:"13:58",title:"🚇 Metrô Weaver → White Hart Lane (+5 min a pé)"},
  {hl:1,time:"14:25",title:"🏟️ Tottenham Hotspur Stadium",bgs:["paid"],body:"Estádio de última geração com <strong>pista de F1 indoor</strong>! O <strong>F1 Experience</strong> (corrida de kart de 15 min) e o <strong>Dare Skywalk</strong> (caminhada no topo) estão no London Pass.",tips:[{t:"info",i:"ℹ️",x:"Nenhum dos dois precisa de reserva — só apresentar o passe."}]},
  {dep:1,time:"16:00",title:"🚶 Saída do estádio → ponto Tottenham Hotspur Football Club"},
  {tr:1,time:"16:10",title:"🚌 Ônibus 259 → Sobell Centre (Stop NN) (+8 min a pé)"},
  {hl:1,time:"16:45",title:"🔴 Emirates Stadium — Arsenal",body:"Chegada no estádio do Arsenal para o jogo contra o Atlético de Madrid (Champions League) às 20h. Passeiem ao redor do estádio e depois assistam ao jogo em algum pub local.",tips:[{t:"food",i:"🍽️",x:"Pubs ao redor do Emirates enlouquecem antes do jogo. Chegue cedo para garantir lugar e pedir algo para comer antes do apito."}]},
],
food:[
  {n:"Bill's Soho",d:"Café da manhã inglês completo: ovos mexidos, bacon, salsichas, baked beans, torradas. Incluso no passe.",p:"Incluso"},
  {n:"Pub ao redor do Emirates",d:"Burger & chips ou pie & mash enquanto assiste ao aquecimento no telão.",p:"£12–18"},
  {n:"Steak & Ale Pie",d:"Torta de carne com cerveja — o clássico dos pubs ingleses em dia de jogo.",p:"£12–16"},
]},

{id:10,city:"Paris",em:"🇫🇷",date:"Qua, 6 mai 2026",t1:"Cidade",t2:"da Luz",ti:0,
intro:"Bonjour Paris! Chegam de Eurostar na capital mais elegante do mundo. Hoje: Ópera Garnier, Torre Eiffel, Arco do Triunfo, Champs-Élysées, Place de La Concorde e o Louvre.",
ev:[
  {dep:1,time:"05:20",title:"🚶 Saída do hotel → +9 min a pé até a estação Lambeth North"},
  {tr:1,time:"05:39",title:"🚇 Metrô Bakerloo → Oxford Circus"},
  {tr:1,time:"05:50",title:"🚇 Troca para linha Victoria → King's Cross St. Pancras (+5 min a pé)"},
  {hl:1,time:"05:59",title:"🏛️ St Pancras — Check-in Eurostar",body:"Chegada na estação St Pancras para o check-in do Eurostar."},
  {tr:1,time:"07:01",title:"🚄 Eurostar → Paris Gare du Nord (chegada 10:29)"},
  {dep:1,time:"10:35",title:"🚶 +11 min a pé (ou Uber) até o hotel"},
  {hl:1,time:"10:46",title:"🏨 Hotel Altona — Deixe as malas",body:"Deixem as bagagens e saiam logo. Façam o check-in quando o quarto estiver liberado."},
  {dep:1,time:"10:55",title:"🚶 +9 min a pé até a estação Poissonnière"},
  {tr:1,time:"11:07",title:"🚇 Metrô linha 7 → Opéra"},
  {hl:1,time:"11:13",title:"🎭 Ópera Garnier",body:"Uma das óperas mais luxuosas do mundo, cenário do lendário 'Fantasma da Ópera'. Exterior neoclássico do séc. XIX é uma obra de arte.",tips:[{t:"info",i:"ℹ️",x:"Visitar o interior custa ~€14. O exterior já impressiona e justifica a parada."}]},
  {dep:1,time:"11:40",title:"🚶 +6 min a pé até o ponto Havre-Haussmann"},
  {tr:1,time:"11:46",title:"🚌 Ônibus 42 → ponto Monttessuy (+2 min a pé)"},
  {hl:1,time:"12:10",title:"🗼 Torre Eiffel",bgs:["must"],body:"A Dama de Ferro! Explore ao redor: foto clássica na <strong>Rue de l'Université</strong>, caminhada pelo <strong>Champ-de-Mars</strong> e vista da margem oposta do Sena. Para a vista do metrô com a torre, vá à estação Bir-Hakeim (6 min a pé) e pegue o metrô 6.",tips:[{t:"warn",i:"⚠️",x:"Cuidado com vendedores ambulantes ao redor da torre — insistentes."}]},
  {dep:1,time:"12:55",title:"🚶 +6 min a pé até a estação Bir-Hakeim"},
  {tr:1,time:"13:00",title:"🚇 Metrô linha 6 → Trocadéro"},
  {hl:1,time:"13:02",title:"🏛️ Trocadéro",body:"A vista mais frontal e icônica da Torre Eiffel, do outro lado do Sena. Uma das fotos mais tiradas de Paris."},
  {dep:1,time:"13:21",title:"🚶 +5 min até a estação Trocadéro"},
  {tr:1,time:"13:26",title:"🚇 Metrô linha 6 → Charles de Gaulle-Étoile"},
  {hl:1,time:"13:30",title:"🏆 Arco do Triunfo",body:"Mandado construir por Napoleão em 1806 para celebrar suas vitórias. No centro de uma rotatória com 12 avenidas. Subida ao topo (paga) oferece vista incrível.",tips:[{t:"warn",i:"⚠️",x:"<strong>NUNCA</strong> atravesse a rotatória do Arco a pé — é ilegal e perigoso. Use o túnel de pedestres subterrâneo."}]},
  {hl:1,time:"13:40",title:"🌳 Champs-Élysées — Almoço",body:"A avenida mais famosa do mundo. Lojas de luxo e restaurantes no primeiro quilômetro. Depois, parques e os Grands Palais até a Place de La Concorde.",tips:[{t:"food",i:"🍽️",x:"<strong>Almoço rápido:</strong> McDonalds ou Burger King nas ruelas laterais da Champs-Élysées. Para algo mais típico, procure uma boulangerie para jambon-beurre (presunto + manteiga em baguete) ou croque-monsieur."}]},
  {tr:1,time:"15:00",title:"🚇 Metrô linha 1 da estação George V → Concorde"},
  {hl:1,time:"15:07",title:"🌊 Place de La Concorde",body:"A maior praça de Paris — onde o rei Luís XVI foi guilhotinado em 1793. O obelisco no centro tem 3.300 anos, vindo diretamente do Egito."},
  {hl:1,time:"15:22",title:"🌸 Jardins des Tuileries",body:"Um dos jardins mais bonitos da Europa, com 1km de extensão até o Louvre. Em maio, na primavera, as flores estão em pleno bloom.",tips:[{t:"info",i:"ℹ️",x:"Se não quiserem andar os ~15 min do jardim, peguem metrô ou ônibus da Place de La Concorde direto para o Louvre."}]},
  {hl:1,time:"15:40",title:"🔷 Pirâmide do Louvre — Arredores",body:"Enquanto o horário marcado para o Louvre é às 17h, explorem os arredores da pirâmide. Há lojas na Rue de Rivoli. Visita opcional ao Palais Royal."},
  {dep:1,time:"16:00",title:"🚶 +5 min a pé até o Palais Royal"},
  {hl:1,time:"16:05",title:"👑 Palais Royal",body:"Galeria com as famosas colunas listradas de Buren (1986). Ambiente calmo e elegante frequentado pelos parisienses."},
  {hl:1,time:"16:45",title:"🖼️ Louvre",bgs:["paid"],body:"O maior museu do mundo. Ao entrar, <strong>evite a Pirâmide</strong> (entrada mais cheia) — use a <strong>Porte des Lions</strong> ou <strong>Carrousel du Louvre</strong>.",tips:[{t:"warn",i:"⚠️",x:"O Louvre é enorme — nunca tente ver tudo. Defina 5–6 obras prioritárias: Mona Lisa, Vênus de Milo, Vitória de Samotrácia. Use o app para navegar."}]},
],
food:[
  {n:"Jambon-Beurre (baguete presunto + manteiga)",d:"O lanche mais consumido da França. Em qualquer boulangerie. Simples, barato e delicioso.",p:"€4–6"},
  {n:"Croque-Monsieur",d:"Sanduíche grelhado de presunto e gruyère gratinado com bechamel. Clássico dos cafés parisienses.",p:"€6–9"},
  {n:"Crepe de rua",d:"Doces (Nutella, manteiga + açúcar) ou salgados (jambon-fromage). Vendedores por todo o centro.",p:"€3–7"},
  {n:"Croissant de manteiga",d:"Da boulangerie mais próxima. A melhor forma de começar a manhã em Paris.",p:"€1,50–3"},
]},

{id:11,city:"Paris",em:"✨",date:"Qui, 7 mai 2026",t1:"Paris",t2:"C'est Magique",ti:1,
intro:"Notre-Dame reaberta, Versalhes e um cruzeiro noturno no Sena. O dia mais romântico e histórico de toda a viagem.",

const tabsEl=document.getElementById('tabs');
const mainEl=document.getElementById('main');

D.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' on':'');
  btn.textContent=`${d.em} D${d.id} ${d.city}`;
  btn.onclick=()=>show(i);
  tabsEl.appendChild(btn);
  const panel=document.createElement('div');
  panel.className='dp'+(i===0?' on':'');
  panel.id='dp'+i;
  panel.innerHTML=build(d,i);
  mainEl.appendChild(panel);
});

function bgHTML(list){
  if(!list||!list.length)return'';
  const m={free:['free','Grátis'],paid:['paid','Pago'],must:['must','Não perca']};
  return`<div class="bgs">${list.map(b=>`<span class="bg bg-${b}">${m[b][1]}</span>`).join('')}</div>`;
}

function tipHTML(list){
  if(!list||!list.length)return'';
  return list.map(t=>`<div class="tip tip-${t.t}"><span class="ti-icon">${t.i}</span><div class="ti-c">${t.x}</div></div>`).join('');
}

function build(d,idx){
  const titleHTML=d.ti===0?`${d.t1}<br><em>${d.t2}</em>`:`<em>${d.t1}</em><br>${d.t2}`;

  const evHTML=d.ev.map(ev=>{
    if(ev.hl){
      return`<div class="ti hl">
        <div class="tl-l"><div class="tl-t">${ev.time}</div><div class="tl-lv"></div></div>
        <div class="tl-m"><div class="dot"></div><div class="tl-lv2"></div></div>
        <div class="tb2"><div class="hc">
          <div class="hc-top"><div class="hc-title">${ev.title}</div>${bgHTML(ev.bgs)}</div>
          <div class="hc-body">${ev.body||''}${tipHTML(ev.tips)}</div>
        </div></div>
      </div>`;
    }
    if(ev.tr){
      return`<div class="ti tr">
        <div class="tl-l"><div class="tl-t">${ev.time}</div><div class="tl-lv"></div></div>
        <div class="tl-m"><div class="dot"></div><div class="tl-lv2"></div></div>
        <div class="tb2"><div class="tr-row">${ev.title}</div></div>
      </div>`;
    }
    // dep (departure/saida)
    return`<div class="ti dep">
      <div class="tl-l"><div class="tl-t">${ev.time}</div><div class="tl-lv"></div></div>
      <div class="tl-m"><div class="dot"></div><div class="tl-lv2"></div></div>
      <div class="tb2"><div class="dep-row">${ev.title}</div></div>
    </div>`;
  }).join('');

  const foodHTML=d.food.map(f=>`<div class="fi"><div class="fn">${f.n}</div><div class="fd">${f.d}</div>${f.p?`<div class="fp">${f.p}</div>`:''}</div>`).join('');
  const sideFood=`<div class="fc-h"><div class="fc-hl">🍽️ Onde comer</div></div><div class="fl">${foodHTML}</div>`;
  const prev=idx>0?D[idx-1]:null;
  const next=idx<D.length-1?D[idx+1]:null;

  return`
    <div class="hero">
      <div class="hero-meta"><span class="dayn">Dia ${d.id} / 15</span><span class="dated">${d.date}</span></div>
      <h1 class="htitle">${titleHTML}</h1>
      <div class="hcity">${d.em} ${d.city}</div>
      <div class="intro">${d.intro}</div>
    </div>
    <div class="grid">
      <div>
        <div class="slabel">Roteiro completo do dia</div>
        <div class="tl">${evHTML}</div>
        <div class="fc-mob">${sideFood}</div>
        <div class="dn">
          <button class="nb" onclick="show(${idx-1})" ${!prev?'disabled':''}>
            <div class="nb-l">← anterior</div>
            <div class="nb-n">${prev?prev.em+' '+prev.city:'—'}</div>
          </button>
          <button class="nb nr" onclick="show(${idx+1})" ${!next?'disabled':''}>
            <div class="nb-l">próximo →</div>
            <div class="nb-n">${next?next.em+' '+next.city:'—'}</div>
          </button>
        </div>
      </div>
      <div class="sidebar"><div class="fc">${sideFood}</div></div>
    </div>`;
}

function show(i){
  if(i<0||i>=D.length)return;
  document.querySelectorAll('.dp').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('dp'+i).classList.add('on');
  const t=document.querySelectorAll('.tab')[i];
  t.classList.add('on');
  t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
