<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --s1:#111118;
  --s2:#16161f;
  --b1:rgba(255,255,255,0.07);
  --b2:rgba(255,255,255,0.13);
  --t:rgb(240,238,232);
  --td:rgba(240,238,232,0.5);
  --tdd:rgba(240,238,232,0.28);
  --ac:#e8c96a;
  --ac2:#c46b3a;
  --ac3:#5b8fa8;
  --glow:rgba(232,201,106,0.18);
}
html{scroll-behavior:smooth}
body{font-family:'Geist Mono',monospace;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.7}

/* TOPBAR */
.tb{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1)}
.tb-i{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:1.2rem;height:54px;padding:0 1.5rem}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ac);white-space:nowrap;flex-shrink:0}
.logo b{color:var(--tdd);font-weight:400}
.tabs{display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none;flex:1;padding:.35rem 0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:transparent;border:1px solid transparent;color:var(--tdd);padding:.28rem .7rem;border-radius:100px;font-family:'Geist Mono',monospace;font-size:.65rem;cursor:pointer;white-space:nowrap;transition:all .15s ease;letter-spacing:.03em}
.tab:hover{color:var(--td);border-color:var(--b2);background:rgba(255,255,255,.04)}
.tab.on{background:var(--ac);border-color:var(--ac);color:#0a0a0f;font-weight:600}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:3rem 1.5rem 6rem}
.dp{display:none}
.dp.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{margin-bottom:2.5rem}
.hero-meta{display:flex;align-items:center;gap:.65rem;margin-bottom:.9rem;flex-wrap:wrap}
.dayn{font-family:'Geist Mono',monospace;font-size:.62rem;color:var(--ac);letter-spacing:.16em;text-transform:uppercase;background:rgba(232,201,106,.09);border:1px solid rgba(232,201,106,.2);padding:.22rem .6rem;border-radius:100px}
.dated{font-family:'Geist Mono',monospace;font-size:.62rem;color:var(--tdd);letter-spacing:.05em}
.htitle{font-family:'Instrument Serif',serif;font-size:clamp(2rem,6vw,3.8rem);line-height:1.05;letter-spacing:-.02em;margin-bottom:.4rem}
.htitle em{font-style:italic;color:var(--ac)}
.hcity{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--tdd)}
.intro{margin-top:1.3rem;background:linear-gradient(135deg,rgba(232,201,106,.055),rgba(91,143,168,.055));border:1px solid var(--b1);border-radius:14px;padding:1.1rem 1.3rem;font-size:.82rem;line-height:1.78;color:rgba(240,238,232,.7);position:relative;overflow:hidden}
.intro::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,201,106,.4),transparent)}

/* GRID */
.grid{display:grid;grid-template-columns:1fr;gap:2rem}
@media(min-width:720px){.grid{grid-template-columns:1fr 290px;gap:2rem}}

/* SECTION LABEL */
.slabel{font-family:'Geist Mono',monospace;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tdd);margin:0 0 1.2rem;display:flex;align-items:center;gap:.7rem}
.slabel::after{content:'';flex:1;height:1px;background:var(--b1)}

/* TIMELINE */
.tl{}
.ti{display:flex;gap:0;margin-bottom:1px;position:relative}
.tl-l{width:48px;min-width:48px;display:flex;flex-direction:column;align-items:flex-end;padding-top:17px;padding-right:8px}
.tl-t{font-family:'Geist Mono',monospace;font-size:.6rem;color:var(--tdd);letter-spacing:.04em;line-height:1}
.tl-lv{width:1px;flex:1;min-height:10px;background:var(--b1);margin-top:4px;margin-right:0;align-self:center;margin-left:auto}
.tl-m{width:20px;min-width:20px;display:flex;flex-direction:column;align-items:center;padding-top:18px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--s2);border:1.5px solid var(--b2);flex-shrink:0;transition:all .2s}
.ti.hl .dot{width:9px;height:9px;background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px var(--glow)}
.ti.tr .dot{background:transparent;border-color:var(--b1)}
.tl-lv2{width:1px;flex:1;min-height:10px;background:var(--b1);margin-top:3px}
.tb2{flex:1;padding:9px 0 9px 11px}

/* HL CARD */
.ti.hl .tb2{padding:0 0 7px 11px}
.hc{background:var(--s1);border:1px solid var(--b1);border-radius:13px;padding:.9rem 1rem;transition:border-color .2s,box-shadow .2s}
.hc:hover{border-color:var(--b2);box-shadow:0 4px 28px rgba(0,0,0,.35)}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.45rem;margin-bottom:.38rem}
.hc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.01em;line-height:1.3;color:var(--t)}
.bgs{display:flex;gap:.25rem;flex-wrap:wrap;flex-shrink:0}
.bg{font-family:'Geist Mono',monospace;font-size:.57rem;letter-spacing:.07em;text-transform:uppercase;padding:.16rem .45rem;border-radius:100px;white-space:nowrap}
.bg-free{background:rgba(90,158,111,.13);color:#80cf98;border:1px solid rgba(90,158,111,.22)}
.bg-paid{background:rgba(212,92,92,.1);color:#e87f7f;border:1px solid rgba(212,92,92,.18)}
.bg-must{background:rgba(232,201,106,.1);color:var(--ac);border:1px solid rgba(232,201,106,.18)}
.hc-body{font-size:.78rem;line-height:1.72;color:rgba(240,238,232,.62)}
.hc-body strong{color:var(--t);font-weight:600}
.hc-body em{color:var(--ac);font-style:italic}

/* TIPS */
.tip{margin-top:.6rem;padding:.62rem .8rem;border-radius:9px;font-size:.75rem;line-height:1.65;display:flex;gap:.45rem}
.ti-icon{flex-shrink:0;font-size:.78rem;line-height:1.65}
.ti-c{flex:1}
.ti-c strong{font-weight:600}
.tip-info{background:rgba(91,143,168,.09);border:1px solid rgba(91,143,168,.14);color:rgba(175,208,224,.88)}
.tip-warn{background:rgba(196,107,58,.09);border:1px solid rgba(196,107,58,.16);color:rgba(228,182,145,.9)}
.tip-food{background:rgba(156,120,68,.09);border:1px solid rgba(196,155,80,.14);color:rgba(228,200,145,.88)}
.tip-transport{background:rgba(91,143,168,.07);border:1px solid rgba(91,143,168,.12);color:rgba(160,195,215,.88)}
.tip-must{background:rgba(232,201,106,.07);border:1px solid rgba(232,201,106,.14);color:rgba(238,222,155,.9)}

/* TR */
.tr-row{padding:.3rem 0;font-size:.73rem;color:var(--tdd);font-style:italic}

/* SIDEBAR */
.fc{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;position:sticky;top:68px}
.fc-h{padding:.8rem 1rem;border-bottom:1px solid var(--b1)}
.fc-hl{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--td)}
.fl{padding:.4rem 0;max-height:calc(100vh - 180px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b1) transparent}
.fi{padding:.68rem 1rem;border-bottom:1px solid var(--b1);transition:background .12s}
.fi:last-child{border-bottom:none}
.fi:hover{background:var(--s2)}
.fn{font-family:'Syne',sans-serif;font-size:.74rem;font-weight:700;color:var(--t);margin-bottom:.22rem;line-height:1.3}
.fd{font-size:.72rem;line-height:1.58;color:var(--tdd)}
.fp{margin-top:.28rem;font-family:'Geist Mono',monospace;font-size:.64rem;color:var(--ac);letter-spacing:.04em}

/* MOBILE FOOD */
.fc-mob{display:none;background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-top:1.8rem}
@media(max-width:719px){.fc-mob{display:block}.sidebar{display:none}}

/* NAV */
.dn{display:flex;gap:.65rem;margin-top:2.5rem;padding-top:1.8rem;border-top:1px solid var(--b1)}
.nb{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:.85rem 1rem;cursor:pointer;transition:all .18s;text-align:left;font-family:'Geist Mono',monospace}
.nb:hover:not(:disabled){border-color:var(--b2);background:var(--s2)}
.nb:disabled{opacity:.22;cursor:default}
.nb.nr{text-align:right}
.nb-l{font-size:.58rem;color:var(--tdd);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.25rem}
.nb-n{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;color:var(--td)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

@media(max-width:600px){.main{padding:1.8rem .9rem 5rem}.htitle{font-size:clamp(1.7rem,8vw,2.8rem)}}
</style>
</head>

  ]},

  {id:4,city:"Alps Road Trip",em:"🏔️",date:"Qui, 30 abr 2026",t1:"Castelos,",t2:"Alpes & Innsbruck",ti:0,
  intro:"O dia mais épico da viagem! Road trip pelos Alpes: Füssen, Neuschwanstein (o castelo que inspirou a Disney), parada na fronteira para a Zugspitze e Innsbruck com teleférico até as montanhas nevadas.",
  ev:[
    {hl:1,time:"06:51",title:"🚗 Alamo — Retirada do carro",body:"A loja abre às 7h. <strong>Avise que vão cruzar a fronteira com a Áustria.</strong> Pergunte sobre correntes de neve e como devolver fora do horário.",tips:[{t:"warn",i:"⚠️",x:"<strong>Vignette austríaca:</strong> Compre pelo app ASFINAG antes de cruzar (~€11,50/10 dias) ou no posto Lge Liquid Gas Energy em Füssen, na B17."},{t:"transport",i:"🚇",x:"<strong>Velocidades:</strong> Área urbana: 50km/h. B12: máx 100km/h. A96 (autobahn): 130km/h recomendado."}]},
    {hl:1,time:"09:50",title:"🏘️ Füssen — Centrinho histórico",body:"Cidade bávara de conto de fadas com casinhas estilo enxaimel e o <strong>Hohe Schloss</strong> acima.",tips:[{t:"food",i:"🍽️",x:"<strong>Coma aqui!</strong> Bakery Höfler: Apfelstrudel e Schneeball. Melhor Schneeball: <strong>Stefanie Diller Schneeballenträume</strong>."}]},
    {hl:1,time:"11:18",title:"🌉 Ponte Marienbrücke",bgs:["must"],body:"Ônibus até a montanha (~€5 ida e volta). A <strong>vista mais fotogênica do Neuschwanstein</strong> — emoldurado pelo vale e pelas montanhas.",tips:[{t:"info",i:"ℹ️",x:"Ônibus a cada 20 min. Se perder um, vá ao lago Alpsee enquanto aguarda."}]},
    {hl:1,time:"11:38",title:"👀 Jugend — Vista panorâmica",body:"Plataforma a meio caminho do castelo com vista incrível para o vale e o Castelo Hohenschwangau. Não pule!"},
    {hl:1,time:"11:50",title:"🏰 Castelo Neuschwanstein",body:"O castelo que inspirou a Disney, construído pelo Rei Luís II. Não vão entrar — chegue à entrada para sentir a escala e a magia."},
    {hl:1,time:"12:40",title:"🏞️ Lago Alpsee",body:"Lago cristalino com vista para os castelos ao fundo. Foto perfeita e ar alpino puro."},
    {hl:1,time:"13:40",title:"🏔️ Leermos — Zugspitze",body:"Pare no posto Shell próximo à <em>Eisenbahnbrücke Ehrwald</em> para fotografar a <strong>Zugspitze</strong> (2.962m) — o pico mais alto da Alemanha."},
    {hl:1,time:"15:30",title:"🎶 Innsbruck — Chegada",body:"Capital do Tirol. Estacione no <strong>Altstadtgarage</strong> (~€3,40/hora). Centro histórico medieval logo acima."},
    {hl:1,time:"15:40",title:"🏘️ Aldstadt + Goldenes Dachl",body:"Rio <strong>Inn</strong> de cor esmeralda que dá nome à cidade. O <strong>Goldenes Dachl</strong> (Telhado Dourado) — 2.657 telhas de cobre dourado do séc. XV."},
    {hl:1,time:"15:50",title:"📸 Marktplatz",body:"Fotografe as casas coloridas do bairro <strong>Mariahilf</strong> refletidas no rio esmeralda — o cartão-postal mais icônico de Innsbruck."},
    {hl:1,time:"16:40",title:"🚡 Seegrube — Nordkette",bgs:["must"],body:"Estação Aldstadt → teleférico até Hungerburg → Seegrube (~2.256m). Neve em maio garantida, vista épica da cidade.",tips:[{t:"warn",i:"⚠️",x:"Leve casaco — faz frio lá em cima mesmo em maio."},{t:"food",i:"🍽️",x:"Jantem ao descer. Comer no topo é possível mas caro."}]},
    {hl:1,time:"21:00",title:"🚗 Saída de Innsbruck",body:"Saiam às 21h no máximo. Abasteçam perto de Munique antes de devolver o carro até 23:30.",tips:[{t:"warn",i:"⚠️",x:"Se a loja estiver fechada, eles indicam onde parar e deixar a chave."}]},
  ],
  food:[
    {n:"Füssen — Apfelstrudel / Schneeball",d:"Café reforçado antes dos castelos. Melhor Schneeball: Stefanie Diller Schneeballenträume.",p:"€4–8"},
    {n:"Innsbruck — Würstelstand",d:"Barraca de salsichas quentes com mostarda e pão. Rápido, típico e austríaco.",p:"€3–5"},
    {n:"Innsbruck — Döner Kebab",d:"Opção rápida antes de subir no teleférico.",p:"€5–7"},
  ]},

  {id:5,city:"Munique",em:"🏛️",date:"Sex, 1 mai 2026",t1:"Munique",t2:"Histórica",ti:0,
  intro:"Último dia em Munique antes de voar para Amsterdã. Englischer Garten com surfistas, Marienplatz, a famosa Hofbräuhaus e a exuberante Asamkirche.",
  ev:[
    {hl:1,time:"08:47",title:"🌳 Englischer Garten",bgs:["must"],body:"Maior que o Central Park. Comece pela <strong>Eisbachwelle</strong> — o canal onde bávaros surfam o ano todo. Depois: <strong>Monopteros</strong> (templo grego na colina) e a pagoda chinesa."},
    {hl:1,time:"10:10",title:"🏛️ Odeonplatz",body:"Onde Hitler fracassou no Putsch de 1923. O rastro de pedras douradas na <strong>Viscardigasse</strong> (Beco dos Desertores) homenageia quem desviava para não fazer a saudação nazista.",tips:[{t:"info",i:"ℹ️",x:"A Theatinerkirche ao lado é a 1ª igreja barroca da Bavária. A Residenz München (palácio real) também fica aqui."}]},
    {hl:1,time:"10:34",title:"🍺 Hofbräuhaus",body:"A cervejaria mais famosa do mundo, fundada em 1589. Cerveja ainda segue a <em>Reinheitsgebot</em> de 1516. Pelo tempo curto, apenas passe em frente."},
    {hl:1,time:"10:47",title:"⭐ Marienplatz",bgs:["must"],body:"O coração de Munique desde 1158. O <strong>carrilhão do Neues Rathaus toca às 11h e 12h</strong> — bonecos mecânicos dançam por 12 minutos!",tips:[{t:"warn",i:"⚠️",x:"Estejam na praça às 11h para ver o carrilhão."}]},
    {hl:1,time:"11:10",title:"⛪ St. Peter Kirche",bgs:["paid"],body:"Torre de 91m com uma das melhores vistas de Munique — em dias claros dá para ver os Alpes.",tips:[{t:"info",i:"ℹ️",x:"Subida ~€5. <strong>Só aceita dinheiro.</strong> Mais de 300 degraus."}]},
    {hl:1,time:"11:54",title:"🥩 Viktualienmarkt — Almoço",bgs:["must"],body:"O mercado gastronômico mais famoso de Munique. O <strong>Maibaum</strong> (Mastro de Maio) no centro é um ícone. Biergarten servindo as 6 cervejarias."},
    {hl:1,time:"13:48",title:"🕍 Asamkirche",bgs:["free"],body:"Igreja barroca dos irmãos Asam (1746). Decoração tão densa que as paredes parecem respirar.",tips:[{t:"warn",i:"⚠️",x:"A porta fica fechada mas não está trancada — empurre com força."}]},
    {hl:1,time:"15:35",title:"✈️ Partida para Amsterdã",body:"S8 na Karlsplatz até o aeroporto. Voo KL1856 às 17:45 → Amsterdã 19:20.",tips:[{t:"transport",i:"🚇",x:"S8 direto Karlsplatz → Aeroporto (~40 min). Saiam com folga."}]},
    {hl:1,time:"20:04",title:"🏨 Hotel Ben Centre — Amsterdã",body:"Bem-vindos à Holanda! Descansem — amanhã é dia de canais e Heineken."},
  ],
  food:[
    {n:"Weisswurst + Pretzel no Viktualienmarkt",d:"Com mostarda doce. O café da manhã bávaro clássico.",p:"€4–7"},
    {n:"Obatzda com Weißbier",d:"Queijo cremoso bávaro com cerveja de trigo gelada no biergarten do mercado.",p:"€8–12"},
    {n:"Biergarten am Chinesischen Turm",d:"Cerveja bávara de manhã no Englischer Garten — completamente normal aqui.",p:"€5–8"},
  ]},

  {id:6,city:"Amsterdã",em:"🇳🇱",date:"Sáb, 2 mai 2026",t1:"Canais,",t2:"Cerveja & Cultura",ti:1,
  intro:"Amsterdã é uma cidade de canais, casas inclinadas e bicicletas por toda parte. Casa de Anne Frank, Heineken Experience e um cruzeiro pelos canais icônicos.",
  ev:[
    {hl:1,time:"10:26",title:"🏛️ Praça Dam",body:"O coração de Amsterdã. Em frente ao <strong>Palácio Real</strong> e ao <strong>Nieuwe Kerk</strong>.",tips:[{t:"food",i:"🍽️",x:"Stroopwafel de uma banca de rua — um bom começo de manhã."}]},
    {hl:1,time:"11:03",title:"🍎 Winkel 43 — Apple Taart",bgs:["must"],body:"A torta de maçã mais famosa de Amsterdã. A fila vale cada minuto.",tips:[{t:"food",i:"🍽️",x:"Torta de maçã: €5,70. Chegue cedo — a fila cresce ao longo do dia."}]},
    {hl:1,time:"11:50",title:"📖 Casa de Anne Frank",bgs:["paid"],body:"Um dos museus mais comoventes do mundo. O esconderijo onde Anne Frank viveu de 1942 a 1944.",tips:[{t:"warn",i:"⚠️",x:"<strong>Reserve com meses de antecedência</strong> — ingressos esgotam rapidamente. Sem reserva é impossível entrar."}]},
    {hl:1,time:"13:43",title:"🍺 Heineken Experience",bgs:["paid"],body:"A fábrica original da Heineken, transformada em experiência imersiva. Inclui cruzeiro pelos canais!",tips:[{t:"info",i:"ℹ️",x:"~€23. Duração: 1h30–2h."}]},
    {hl:1,time:"16:00",title:"⛵ Heineken Flagship Cruise",body:"1 hora pelos canais — incluso com a Heineken. Embarque no <strong>Rijksmuseum</strong> (7 min a pé). Chegue 15 min antes.",tips:[{t:"warn",i:"⚠️",x:"Horários separados da cervejaria. Planeje o deslocamento."}]},
    {hl:1,time:"17:12",title:"🛍️ Albert Cuypstraat Markt",bgs:["must"],body:"O maior mercado a céu aberto dos Países Baixos. Stroopwafels frescos, haring e souvenirs autênticos.",tips:[{t:"food",i:"🍽️",x:"<strong>Compre aqui:</strong> Stroopwafel quentinho, haring com cebola e patatje oorlog."}]},
    {hl:1,time:"20:45",title:"🌙 Red Light District",body:"O famoso bairro à noite — ruelas medievais com canais e atmosfera única.",tips:[{t:"warn",i:"⚠️",x:"Proibido fotografar as trabalhadoras nas janelas. Multa alta e possível confisco do celular."}]},
  ],
  food:[
    {n:"Manneken Pis — Batatas fritas",d:"Fritas holandesas com maionese, satay ou outros molhos. Ícone da street food.",p:"€5–9"},
    {n:"Haring (arenque marinado)",d:"O prato mais típico da Holanda. Peixe cru com cebola picada. Coma de cabeça para baixo!",p:"€4–6"},
    {n:"Stroopwafel fresco no mercado",d:"Dois wafels crocantes com xarope de caramelo quente. Sempre melhor fresco e quentinho.",p:"€2–3"},
    {n:"Patatje Oorlog ('Batatas Guerra')",d:"Batatas fritas com maionese + molho de amendoim + cebola. Estranho mas viciante.",p:"€5–7"},
  ]},

  {id:7,city:"Londres",em:"🇬🇧",date:"Dom, 3 mai 2026",t1:"Chegada",t2:"em Londres",ti:0,
  intro:"Vocês chegam de Eurostar — o trem que passa sob o Canal da Mancha! Chegada ao meio-dia com bastante tempo para os principais pontos. Londres tem muitas atrações gratuitas e incríveis.",
  ev:[
    {hl:1,time:"08:17",title:"🚄 Eurostar — Amsterdã → Londres",body:"O trem que atravessa o fundo do Mar do Norte! Chegada em London St Pancras às 11:57.",tips:[{t:"info",i:"ℹ️",x:"St Pancras é uma das mais belas estações vitorianas do mundo — aproveitem a chegada."}]},
    {hl:1,time:"12:15",title:"⚡ Plataforma 9¾ — King's Cross",body:"A plataforma de Harry Potter! Carrinho 'atravessando' a parede, cachecóis das casas de Hogwarts e loja exclusiva.",tips:[{t:"info",i:"ℹ️",x:"A loja vende produtos exclusivos — ótimo para souvenirs do universo HP."}]},
    {hl:1,time:"13:44",title:"🦁 Trafalgar Square — Almoço",body:"A praça mais famosa de Londres. Leões de bronze e a Coluna de Nelson. <strong>National Gallery</strong> ao lado é gratuita.",tips:[{t:"food",i:"🍽️",x:"Pub ao redor para fish & chips. Ou Greggs/Pret A Manger para economizar."}]},
    {hl:1,time:"14:45",title:"👑 Buckingham Palace",body:"A residência oficial da família real britânica. Fachada e portões são impressionantes."},
    {hl:1,time:"15:30",title:"⛪ Westminster Abbey",bgs:["paid"],body:"A abadia onde reis são coroados e enterrados. Túmulos de Newton, Darwin, Chaucer e Dickens."},
    {hl:1,time:"15:45",title:"🕰️ Big Ben (Torre Elizabeth)",body:"Para a foto clássica: fique na rua <strong>Great George St</strong> para enquadrar a torre com a cabine telefônica vermelha.",tips:[{t:"info",i:"ℹ️",x:"'Big Ben' é tecnicamente só o sino dentro da Torre Elizabeth."}]},
    {hl:1,time:"16:08",title:"🐎 Whitehall — Guarda Real",body:"Foto com os guardas a cavalo. Mantenham distância — o cavalo pode morder."},
    {hl:1,time:"16:53",title:"⛪ St. Paul's Cathedral",body:"A catedral de Christopher Wren. Depois, vão ao <strong>One New Change</strong> para o elevador panorâmico gratuito com vista incrível."},
    {hl:1,time:"17:36",title:"🌿 Sky Garden",bgs:["free"],body:"Jardim suspenso no 35º andar com vista 360° de Londres.",tips:[{t:"warn",i:"⚠️",x:"Reserve em skygarden.london — gratuito mas esgota rápido."}]},
    {hl:1,time:"18:00",title:"🏛️ Leadenhall Market",body:"Mercado vitoriano coberto de 1881 — filmagens do <strong>Beco Diagonal</strong> de Harry Potter. Arcos coloridos e piso xadrez."},
    {hl:1,time:"18:48",title:"📚 Cecil Court — Beco Diagonal",body:"A inspiração real para o Beco Diagonal: ruelas medievais com livrarias antigas e antiquários."},
    {hl:1,time:"19:00",title:"🎭 Leicester Sq / Chinatown / Piccadilly",body:"O triângulo mais animado de Londres.",tips:[{t:"food",i:"🍽️",x:"<strong>Jantar na Chinatown:</strong> Dim sum, pato laqueado ou noodles. Fila do lado de fora = qualidade."}]},
    {hl:1,time:"19:43",title:"🛍️ Carnaby Street",body:"A rua mais fashion de Londres desde os anos 60."},
  ],
  food:[
    {n:"Greggs — Sausage Roll",d:"O pastelão de salsicha mais amado da Inglaterra. Quente, crocante, barato.",p:"£1,50–3"},
    {n:"Fish & Chips num pub",d:"Peixe empanado e frito com batatas grossas, vinagre de malte e sal.",p:"£10–15"},
    {n:"Pret A Manger",d:"Sanduíches, sopas e saladas frescas. Qualidade acima da média para o preço.",p:"£5–9"},
    {n:"Chinatown — Dim Sum",d:"Melhor custo-benefício gastronômico de Londres.",p:"£6–12"},
    {n:"Nando's",d:"Frango grelhado peri-peri com níveis de picância. Amado pelos ingleses.",p:"£12–15"},
  ]},

  {id:8,city:"Londres",em:"🎡",date:"Seg, 4 mai 2026",t1:"Oxford Street,",t2:"Eye & Wembley",ti:0,
  intro:"Dia de compras na rua mais famosa do mundo, roda-gigante às margens do Tâmisa e o estádio mais icônico do futebol inglês.",
  ev:[
    {hl:1,time:"10:00",title:"🛍️ Oxford Street — Compras",body:"A rua de compras mais famosa do mundo. <strong>Primark</strong> (multiandar), <strong>TK Maxx</strong>, <strong>Selfridges</strong>, <strong>UNIQLO</strong>, <strong>H&M</strong>.",tips:[{t:"warn",i:"⚠️",x:"O Primark da Oxford Street é enorme. Vá cedo para evitar filas."}]},
    {hl:1,time:"12:14",title:"🐟 The Seashell of Lisson Grove",bgs:["must"],body:"Um dos melhores fish & chips de Londres. Incluso no London Pass — só apresentar.",tips:[{t:"warn",i:"⚠️",x:"Funciona das 12h às 17:30."}]},
    {hl:1,time:"14:00",title:"🎡 London Eye",bgs:["paid"],body:"A roda-gigante de 135m com vista panorâmica 360° de Londres. A volta dura ~30 min.",tips:[{t:"warn",i:"⚠️",x:"Reserve pelo GO City App com até 15 dias de antecedência."}]},
    {hl:1,time:"15:32",title:"🏟️ Wembley Stadium Tour",bgs:["paid"],body:"O estádio mais famoso do futebol inglês — Copa do Mundo 1966.",tips:[{t:"info",i:"ℹ️",x:"London Pass inclui o tour — só mostrar o passe. Horário das 16h."}]},
  ],
  food:[
    {n:"The Seashell of Lisson Grove",d:"Incluso no passe. Um dos melhores fish & chips de Londres, com mushy peas.",p:"Incluso no passe"},
    {n:"Pub após o Wembley",d:"Shepherd's pie ou Sunday roast — o jantar britânico clássico.",p:"£12–18"},
  ]},

  {id:9,city:"Londres",em:"⚽",date:"Ter, 5 mai 2026",t1:"Thames Cruise,",t2:"Torres & Arsenal",ti:0,
  intro:"Cruzeiro pelo Tâmisa, Tower Bridge, estádio do Tottenham com F1 e a grande final: Arsenal em casa na Champions League!",
  ev:[
    {hl:1,time:"10:30",title:"🍳 Bill's Soho — Café da manhã",body:"Incluso no London Pass. Café da manhã até as 11h.",tips:[{t:"warn",i:"⚠️",x:"Cheguem até as 10:45 para garantir o café dentro do horário."}]},
    {hl:1,time:"12:00",title:"⛵ Thames Cruise 24h",body:"Cruzeiro panorâmico pelo Tâmisa. Apresente o passe para um passe de 24h — pode usar amanhã também!"},
    {hl:1,time:"12:40",title:"🏰 Tower Bridge e Torre de Londres",body:"Vista externa da Tower Bridge e da fortaleza medieval.",tips:[{t:"info",i:"ℹ️",x:"London Pass cobre a entrada se quiserem visitar internamente."}]},
    {hl:1,time:"14:25",title:"🏟️ Tottenham Hotspur Stadium",bgs:["paid"],body:"Estádio de última geração com pista de F1 indoor! <strong>F1 Experience</strong> (kart 15 min) e <strong>Dare Skywalk</strong> cobertos pelo London Pass.",tips:[{t:"info",i:"ℹ️",x:"Não precisa de reserva — só apresentar o passe."}]},
    {hl:1,time:"16:45",title:"⚽ Emirates — Arsenal vs Atlético",body:"Jogo da Champions às 20h. Passem ao redor do estádio e escolham um pub para assistir.",tips:[{t:"food",i:"🍽️",x:"Pubs ao redor do Emirates enlouquecem antes do jogo. Chegue cedo."}]},
  ],
  food:[
    {n:"Bill's Soho",d:"Café da manhã inglês completo: ovos, bacon, salsichas, baked beans. Incluso no passe.",p:"Incluso"},
    {n:"Pub ao redor do Emirates",d:"Burger & chips ou pie & mash com o aquecimento no telão.",p:"£12–18"},
  ]},

  {id:10,city:"Paris",em:"🇫🇷",date:"Qua, 6 mai 2026",t1:"Cidade",t2:"da Luz",ti:0,
  intro:"Bonjour Paris! Chegam de Eurostar na capital mais elegante do mundo. Hoje: Ópera Garnier, Torre Eiffel, Arco do Triunfo, Champs-Élysées e o Louvre.",
  ev:[
    {hl:1,time:"07:01",title:"🚄 Eurostar Londres → Paris",body:"Saída de St Pancras, chegada em Gare du Nord às 10:29."},
    {hl:1,time:"10:46",title:"🏨 Hotel Altona — Malas",body:"Deixem as bagagens e saiam logo."},
    {hl:1,time:"11:13",title:"🎭 Ópera Garnier",body:"Uma das óperas mais luxuosas do mundo. Cenário do 'Fantasma da Ópera'. Exterior neoclássico magnífico.",tips:[{t:"info",i:"ℹ️",x:"Visitar o interior custa ~€14. O exterior já justifica a parada."}]},
    {hl:1,time:"12:10",title:"🗼 Torre Eiffel",bgs:["must"],body:"A Dama de Ferro! Foto na <strong>Rue de l'Université</strong>, no <strong>Champ-de-Mars</strong> e do outro lado do Sena. Vista do metrô na estação <strong>Bir-Hakeim</strong>.",tips:[{t:"warn",i:"⚠️",x:"Cuidado com vendedores ambulantes ao redor da torre — insistentes."}]},
    {hl:1,time:"13:02",title:"🏛️ Trocadéro",body:"A vista mais frontal e icônica da Torre Eiffel, do outro lado do Sena."},
    {hl:1,time:"13:30",title:"🏆 Arco do Triunfo",body:"Mandado construir por Napoleão em 1806. Subida paga ao topo.",tips:[{t:"warn",i:"⚠️",x:"NUNCA atravesse a rotatória a pé — use o túnel de pedestres subterrâneo."}]},
    {hl:1,time:"13:40",title:"🌳 Champs-Élysées — Almoço",body:"A avenida mais famosa do mundo. McDonalds e Burger King nas ruelas laterais.",tips:[{t:"food",i:"🍽️",x:"<strong>Mais típico:</strong> Qualquer boulangerie para um jambon-beurre (baguete + presunto + manteiga) ou croque-monsieur."}]},
    {hl:1,time:"15:07",title:"🌊 Place de La Concorde",body:"A maior praça de Paris — onde Luís XVI foi guilhotinado em 1793. O obelisco tem 3.300 anos."},
    {hl:1,time:"15:22",title:"🌸 Jardins des Tuileries",body:"1km de jardins até o Louvre. Em maio, flores em pleno bloom. Caminhada preguiçosa."},
    {hl:1,time:"16:05",title:"👑 Palais Royal",body:"Galeria de colunas listradas (colunas de Buren). Ambiente calmo e elegante frequentado por parisienses."},
    {hl:1,time:"16:45",title:"🖼️ Louvre",bgs:["paid"],body:"O maior museu do mundo. Evite a Pirâmide — use <strong>Porte des Lions</strong> ou <strong>Carrousel du Louvre</strong>.",tips:[{t:"warn",i:"⚠️",x:"Nunca tente ver tudo. Defina 5–6 obras: Mona Lisa, Vênus de Milo, Vitória de Samotrácia."}]},
  ],
  food:[
    {n:"Jambon-Beurre (baguete presunto + manteiga)",d:"O lanche mais consumido da França. Em qualquer boulangerie.",p:"€4–6"},
    {n:"Croque-Monsieur",d:"Sanduíche grelhado de presunto e gruyère gratinado. Clássico parisiense.",p:"€6–9"},
    {n:"Crepe de rua",d:"Doces (Nutella) ou salgados (jambon-fromage). Por toda a cidade.",p:"€3–7"},
    {n:"Croissant de manteiga",d:"Da boulangerie mais próxima. A melhor forma de começar o dia em Paris.",p:"€1,50–3"},
  ]},

  {id:11,city:"Paris",em:"✨",date:"Qui, 7 mai 2026",t1:"Paris",t2:"C'est Magique",ti:1,
  intro:"Notre-Dame reaberta, Versalhes e cruzeiro noturno no Sena. O dia mais romântico e histórico de toda a viagem.",
  ev:[

const tabsEl=document.getElementById('tabs');
const mainEl=document.getElementById('main');

D.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' on':'');
  btn.textContent=`${d.em} D${d.id} ${d.city}`;
  btn.onclick=()=>show(i);
  tabsEl.appendChild(btn);

  const panel=document.createElement('div');
  panel.className='dp'+(i===0?' on':'');
  panel.id='dp'+i;
  panel.innerHTML=build(d,i);
  mainEl.appendChild(panel);
});

function bgs(list){
  if(!list||!list.length)return'';
  const m={free:['free','Grátis'],paid:['paid','Pago'],must:['must','Não perca']};
  return`<div class="bgs">${list.map(b=>`<span class="bg bg-${b}">${m[b][1]}</span>`).join('')}</div>`;
}

function tips(list){
  if(!list||!list.length)return'';
  return list.map(t=>`<div class="tip tip-${t.t}"><span class="ti-icon">${t.i}</span><div class="ti-c">${t.x}</div></div>`).join('');
}

function build(d,idx){
  const titleHTML=d.ti===0
    ?`${d.t1}<br><em>${d.t2}</em>`
    :`<em>${d.t1}</em><br>${d.t2}`;

  const evHTML=d.ev.map(ev=>{
    if(!ev.hl)return`
      <div class="ti tr">
        <div class="tl-l"><div class="tl-t">${ev.time}</div><div class="tl-lv"></div></div>
        <div class="tl-m"><div class="dot"></div><div class="tl-lv2"></div></div>
        <div class="tb2"><div class="tr-row">${ev.title}</div></div>
      </div>`;
    return`
      <div class="ti hl">
        <div class="tl-l"><div class="tl-t">${ev.time}</div><div class="tl-lv"></div></div>
        <div class="tl-m"><div class="dot"></div><div class="tl-lv2"></div></div>
        <div class="tb2">
          <div class="hc">
            <div class="hc-top">
              <div class="hc-title">${ev.title}</div>
              ${bgs(ev.bgs)}
            </div>
            <div class="hc-body">${ev.body||''}${tips(ev.tips)}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  const foodHTML=d.food.map(f=>`
    <div class="fi">
      <div class="fn">${f.n}</div>
      <div class="fd">${f.d}</div>
      ${f.p?`<div class="fp">${f.p}</div>`:''}
    </div>`).join('');

  const sideFood=`<div class="fc-h"><div class="fc-hl">🍽️ Onde comer</div></div><div class="fl">${foodHTML}</div>`;

  const prev=idx>0?D[idx-1]:null;
  const next=idx<D.length-1?D[idx+1]:null;

  return`
    <div class="hero">
      <div class="hero-meta">
        <span class="dayn">Dia ${d.id} / 15</span>
        <span class="dated">${d.date}</span>
      </div>
      <h1 class="htitle">${titleHTML}</h1>
      <div class="hcity">${d.em} ${d.city}</div>
      <div class="intro">${d.intro}</div>
    </div>
    <div class="grid">
      <div>
        <div class="slabel">Roteiro do dia</div>
        <div class="tl">${evHTML}</div>
        <div class="fc-mob">${sideFood}</div>
        <div class="dn">
          <button class="nb" onclick="show(${idx-1})" ${!prev?'disabled':''}>
            <div class="nb-l">← anterior</div>
            <div class="nb-n">${prev?prev.em+' '+prev.city:'—'}</div>
          </button>
          <button class="nb nr" onclick="show(${idx+1})" ${!next?'disabled':''}>
            <div class="nb-l">próximo →</div>
            <div class="nb-n">${next?next.em+' '+next.city:'—'}</div>
          </button>
        </div>
      </div>
      <div class="sidebar">
        <div class="fc">${sideFood}</div>
      </div>
    </div>`;
}

function show(i){
  if(i<0||i>=D.length)return;
  document.querySelectorAll('.dp').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('dp'+i).classList.add('on');
  const t=document.querySelectorAll('.tab')[i];
  t.classList.add('on');
  t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
